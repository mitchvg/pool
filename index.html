<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>PoolCheck Pro</title>
<style>
:root{
  --g:#1D9E75;--gd:#0F6E56;--gl:#E1F5EE;
  --bg:#f4f4f2;--s:#fff;--bd:rgba(0,0,0,.1);
  --t:#111;--t2:#555;--t3:#aaa;
  --r:14px;--rs:10px;
  --ok:#2d6a4f;--ok-bg:#eaf3de;
  --warn:#7a4f00;--warn-bg:#faeeda;
  --bad:#8b1c1c;--bad-bg:#fcebeb;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:2rem}
.hdr{background:var(--gd);padding:1rem 1.25rem;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.hdr-title{font-size:17px;font-weight:700;color:#fff}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:1px}
.wrap{max-width:480px;margin:0 auto;padding:1.25rem}
.card{background:var(--s);border-radius:var(--r);border:1px solid var(--bd);padding:1.25rem;margin-bottom:1rem}
.card h2{font-size:15px;font-weight:700;margin-bottom:1rem;color:var(--gd)}
.state{text-align:center;padding:3rem 1.5rem}
.state-icon{font-size:52px;margin-bottom:.75rem}
.state-title{font-size:18px;font-weight:700;color:var(--gd);margin-bottom:.5rem}
.state-sub{font-size:13px;color:var(--t2);line-height:1.7;max-width:300px;margin:0 auto 1.5rem}
.fg{margin-bottom:12px}
label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px}
input,select,textarea{width:100%;padding:11px 13px;border:1.5px solid var(--bd);border-radius:var(--rs);font-size:15px;background:#fff;color:var(--t);outline:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(29,158,117,.1)}
textarea{resize:vertical;min-height:70px;font-size:14px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:block;width:100%;padding:13px;background:var(--g);color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:700;cursor:pointer;text-align:center}
.btn:active{opacity:.85}
.btn-out{background:transparent;border:2px solid var(--g);color:var(--g)}
.btn-sm{display:inline-block;width:auto;padding:7px 14px;font-size:13px;font-weight:600;border-radius:8px}
.photo-zone{border:2px dashed var(--bd);border-radius:var(--rs);padding:1.25rem;text-align:center;cursor:pointer;transition:border-color .2s;position:relative;background:#fafaf8}
.photo-zone:hover{border-color:var(--g)}
.photo-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-preview{width:100%;border-radius:8px;margin-top:8px;max-height:200px;object-fit:cover}
/* Metingen slider UI */
.strip-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:.5rem}
.strip-param{background:#fafaf8;border:1px solid var(--bd);border-radius:10px;padding:.75rem;text-align:center}
.strip-param-label{font-size:11px;font-weight:700;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.crop-row{display:flex;justify-content:center;gap:8px;margin-bottom:6px}
.pad-crop-wrap{display:none;text-align:center}
.pad-crop-wrap canvas{border-radius:5px;border:1.5px solid var(--bd);width:60px;height:42px;display:block;margin:0 auto 2px}
.pad-crop-wrap span{font-size:9px;color:var(--t3);display:block}
.ref-crop-wrap{display:none;text-align:center}
.ref-crop-wrap canvas{border-radius:5px;border:1.5px solid var(--g);width:60px;height:42px;display:block;margin:0 auto 2px}
.ref-crop-wrap span{font-size:9px;color:var(--t3);display:block}
.strip-param-val{font-size:20px;font-weight:700;color:var(--gd);margin-bottom:5px;line-height:1}
.ref-cells{display:flex;border-radius:5px;overflow:hidden;margin-bottom:5px;height:30px;border:1px solid var(--bd)}
.ref-cell{flex:1;display:flex;align-items:flex-end;justify-content:center;padding-bottom:2px;border-right:1px solid rgba(255,255,255,.35)}
.ref-cell:last-child{border-right:none}
.ref-cell-val{font-size:7.5px;font-weight:700;line-height:1}
.strip-reasoning{font-size:9.5px;color:var(--t3);line-height:1.4;margin-top:3px;min-height:0}
input[type=range]{width:100%;height:4px;-webkit-appearance:none;appearance:none;background:linear-gradient(to right,var(--g) 50%,var(--bd) 50%);border-radius:2px;outline:none;padding:0;border:none;box-shadow:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--g);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.vol-display{font-size:14px;color:var(--t2);padding:10px 13px;background:#f5f5f3;border-radius:var(--rs);border:1.5px solid var(--bd)}
/* Advice */
.advice{border-radius:10px;padding:.9rem 1rem;margin-bottom:.6rem;border-left:4px solid transparent}
.advice.ok  {background:var(--ok-bg); border-color:var(--ok)}
.advice.warn{background:var(--warn-bg);border-color:var(--warn)}
.advice.bad {background:var(--bad-bg); border-color:var(--bad)}
.advice-title{font-size:14px;font-weight:700}
.advice.ok   .advice-title{color:var(--ok)}
.advice.warn .advice-title{color:var(--warn)}
.advice.bad  .advice-title{color:var(--bad)}
.advice-body{font-size:13px;color:var(--t2);margin-top:4px;line-height:1.6}
.advice-dose{font-size:13px;font-weight:600;margin-top:5px}
/* History */
.visit-card{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:1rem;margin-bottom:.75rem}
.visit-date{font-size:12px;color:var(--t3);margin-bottom:.4rem}
.visit-vals{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.5rem}
.val-chip{font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px}
.val-ok{background:var(--ok-bg);color:var(--ok)}
.val-warn{background:var(--warn-bg);color:var(--warn)}
.val-bad{background:var(--bad-bg);color:var(--bad)}
.sp{width:22px;height:22px;border:3px solid var(--bd);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-block{text-align:center;padding:2rem;color:var(--t2);font-size:14px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.on{opacity:1}
.code-input{font-size:24px;letter-spacing:.15em;text-transform:uppercase;text-align:center;font-weight:700}
.pub-info{background:var(--gl);border:1px solid rgba(29,158,117,.2);border-radius:var(--rs);padding:.75rem 1rem;font-size:13px;color:var(--gd);margin-bottom:1rem}
.tabs{display:flex;background:#f0f0ee;border-radius:var(--rs);padding:3px;margin-bottom:1.25rem;gap:2px}
.tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;border:none;background:none;color:var(--t2)}
.tab.on{background:var(--s);color:var(--gd);box-shadow:0 1px 3px rgba(0,0,0,.08)}
/* Registratie / uitnodiging */
.code-big{font-size:28px;font-weight:800;letter-spacing:.2em;color:var(--gd);text-align:center;padding:.75rem;background:var(--gl);border-radius:var(--rs);margin:.75rem 0}
.qr-wrap{text-align:center;margin:.75rem 0}
.qr-wrap img,.qr-wrap canvas{border-radius:8px;border:1px solid var(--bd)}
.share-row{display:flex;gap:8px;justify-content:center;margin-top:.5rem;flex-wrap:wrap}
.share-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);background:#fff;color:var(--t)}
.share-btn.wa{background:#25D366;color:#fff;border-color:#25D366}
.share-btn.mail{background:#4A90D9;color:#fff;border-color:#4A90D9}
.role-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:6px}
.role-owner{background:#f3e8ff;color:#6b21a8}
.role-technician{background:var(--gl);color:var(--gd)}
.role-viewer{background:#f0f0f0;color:#555}
.or-divider{text-align:center;color:var(--t3);font-size:12px;margin:.75rem 0;position:relative}
.or-divider::before,.or-divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--bd)}
.or-divider::before{left:0}.or-divider::after{right:0}
.invite-section{border-top:1px solid var(--bd);padding-top:1rem;margin-top:.75rem}
</style>
</head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<body>

<div class="hdr" id="hdr">
  <span style="font-size:24px">💧</span>
  <div>
    <div class="hdr-title" id="hdr-title">PoolCheck Pro</div>
    <div class="hdr-sub"   id="hdr-sub"></div>
  </div>
</div>

<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<script>
const API = 'api.php';
let USER      = null;
let ZWEMBAD   = null;
let USER_ROLE = null; // rol van USER voor het huidige ZWEMBAD
let AI_RESULT = null;
let AI_IMG    = null;
const extraPhotos = { strip: '', chem: '', pool: '' };

// ── URL params + localStorage ─────────────────────────────────
function getParam(k) {
  return new URLSearchParams(location.search).get(k) || localStorage.getItem('pc_' + k) || '';
}
function saveParam(k, v) { if (v) localStorage.setItem('pc_' + k, v); }
function clearParam(k)   { localStorage.removeItem('pc_' + k); }

// ── API ───────────────────────────────────────────────────────
async function call(action, method = 'GET', body = null) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(`${API}?action=${action}`, opts);
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`);
  return d;
}

// ── Boot ──────────────────────────────────────────────────────
async function boot() {
  const p          = new URLSearchParams(location.search);
  const inviteToken = p.get('invite');
  const userToken  = p.get('m') || getParam('m');
  const userCode   = p.get('uc') || getParam('uc');
  const poolToken  = p.get('k') || getParam('k');
  const poolCode   = (p.get('c') || '').toUpperCase();

  // Uitnodigingsflow
  if (inviteToken) {
    render('invite', inviteToken);
    return;
  }

  // User ophalen via code (nieuw) of magic token (oud/compat)
  if (userCode) {
    try {
      const d = await call('login_user_code', 'POST', { user_code: userCode });
      USER = d.user;
      if (d.magic_token) saveParam('m', d.magic_token);
      saveParam('uc', userCode);
      // Sync role wanneer ZWEMBAD al bekend is
      if (d.pools) {
        window._USER_POOLS = d.pools;
      }
    } catch (e) { clearParam('uc'); }
  } else if (userToken) {
    try {
      const d = await call('get_user&token=' + encodeURIComponent(userToken));
      USER = d.user;
      saveParam('m', userToken);
    } catch (e) { clearParam('m'); }
  }

  if (poolToken || poolCode) {
    try {
      const q = poolToken
        ? 'zwembad&token=' + encodeURIComponent(poolToken) + '&user_token=' + encodeURIComponent(userToken || '')
        : 'zwembad&code='  + encodeURIComponent(poolCode)  + '&user_token=' + encodeURIComponent(userToken || '');
      const d = await call(q);
      ZWEMBAD = d.zwembad;
      saveParam('k', ZWEMBAD.qr_token || poolToken);
    } catch (e) { /* 403 of 404: zwembad niet laden */ }
  }

  // Bepaal rol van user voor dit zwembad
  if (USER && ZWEMBAD && window._USER_POOLS) {
    const match = window._USER_POOLS.find(p => p.id === ZWEMBAD.id || p.qr_token === ZWEMBAD.qr_token);
    USER_ROLE = match ? match.role : 'technician';
  }

  render();
}

// ── Render ────────────────────────────────────────────────────
function render(mode, arg) {
  const app = document.getElementById('app');
  if (mode === 'invite')        renderInvite(arg, app);
  else if (!USER && !ZWEMBAD)   renderLanding(app);
  else if (ZWEMBAD && !USER)    renderPublic(app);
  else if (USER && !ZWEMBAD)    renderChoose(app);
  else                          renderFull(app);
}

// ── State 1: niets bekend ─────────────────────────────────────
function renderLanding(app) {
  setHdr('PoolCheck Pro', '');
  app.innerHTML = `
    <div class="state" style="padding:2rem 1.5rem">
      <div class="state-icon">💧</div>
      <div class="state-title">PoolCheck Pro</div>
      <div class="state-sub">Scan de QR-code op het zwembad, of log in met jouw codes.</div>
    </div>
    <div class="card">
      <h2>Inloggen</h2>
      <div class="fg">
        <label>Poolcode</label>
        <input class="code-input" id="ci" maxlength="8" placeholder="PXXXXX" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div class="fg">
        <label>Gebruikerscode <span style="font-weight:400;color:var(--t3)">(optioneel)</span></label>
        <input class="code-input" id="ui" maxlength="8" placeholder="UXXXXX" oninput="this.value=this.value.toUpperCase()">
      </div>
      <button class="btn" onclick="loginWithCodes()">Inloggen</button>
    </div>
    <div class="card">
      <h2>Nieuw aanmelden</h2>
      <p style="font-size:13px;color:var(--t2);margin-bottom:.75rem">Maak gratis een account aan en voeg je zwembad toe.</p>
      <div class="fg"><label>Naam *</label><input id="reg-name" placeholder="Jan de Vries"></div>
      <div class="fg"><label>E-mail <span style="font-weight:400;color:var(--t3)">(optioneel)</span></label><input id="reg-email" type="email" placeholder="jan@email.com"></div>
      <div class="fg"><label>Telefoon <span style="font-weight:400;color:var(--t3)">(optioneel)</span></label><input id="reg-phone" type="tel" placeholder="+31 6 12345678"></div>
      <button class="btn btn-out" onclick="registerUser()">Aanmelden</button>
    </div>`;
}

// ── State 2: zwembad publiek, geen user ───────────────────────
function renderPublic(app) {
  setHdr(ZWEMBAD.name, ZWEMBAD.address || '');
  app.innerHTML = `
    <div class="pub-info">Publieke weergave — laatste testresultaat</div>
    <div id="pub-last"><div class="loading-block"><div class="sp"></div></div></div>
    <div class="card">
      <h2>Inloggen met gebruikerscode</h2>
      <div class="fg">
        <label>Gebruikerscode</label>
        <input class="code-input" id="ut-in" maxlength="8" placeholder="UXXXXX" oninput="this.value=this.value.toUpperCase()">
      </div>
      <button class="btn btn-out" onclick="applyUserCode()">Inloggen</button>
      <p style="font-size:12px;color:var(--t3);margin-top:.75rem;text-align:center">
        Nog geen code?
        <a href="#" style="color:var(--g)" onclick="event.preventDefault();showRegisterInline()">Aanmelden</a>
      </p>
    </div>
    <div id="reg-inline" style="display:none"></div>`;
  loadPublicLast();
}

async function loadPublicLast() {
  const el = document.getElementById('pub-last');
  if (!el) return;
  try {
    const d = await call('zwembad_history&token=' + encodeURIComponent(getParam('k')));
    const v = (d.visits || [])[0];
    if (!v) { el.innerHTML = '<div class="card"><p style="color:var(--t3);font-size:14px;text-align:center;padding:.5rem">Nog geen testresultaten.</p></div>'; return; }
    el.innerHTML = `<div class="visit-card">
      <div class="visit-date">${v.visit_date}</div>
      <div class="visit-vals">${valChips(v)}</div>
      ${adviceHtml(v.advice_json)}
    </div>`;
  } catch (e) { el.innerHTML = ''; }
}

function showRegisterInline() {
  const el = document.getElementById('reg-inline');
  if (!el) return;
  el.style.display = 'block';
  el.innerHTML = `<div class="card">
    <h2>Aanmelden</h2>
    <div class="fg"><label>Naam *</label><input id="reg2-name" placeholder="Jan de Vries"></div>
    <div class="fg"><label>E-mail</label><input id="reg2-email" type="email"></div>
    <button class="btn" onclick="registerUser('reg2-name','reg2-email','','pub')">Aanmelden</button>
  </div>`;
}

async function applyUserCode() {
  const code = (document.getElementById('ut-in')?.value || '').trim().toUpperCase();
  if (!code.startsWith('U') || code.length < 4) return toast('Voer een geldige gebruikerscode in (bijv. UXXXXX)', true);
  try {
    const d = await call('login_user_code', 'POST', { user_code: code });
    USER = d.user;
    saveParam('uc', code);
    if (d.magic_token) saveParam('m', d.magic_token);
    if (d.pools) window._USER_POOLS = d.pools;
    // Bepaal rol voor huidig zwembad
    if (ZWEMBAD && d.pools) {
      const match = d.pools.find(p => p.id === ZWEMBAD.id || p.qr_token === ZWEMBAD.qr_token);
      USER_ROLE = match ? match.role : 'technician';
    }
    render();
  } catch(e) { toast(e.message, true); }
}

// ── State 3: user bekend, geen zwembad ───────────────────────
const ROLE_LABEL = { owner: 'Eigenaar', technician: 'Monteur', viewer: 'Bekijken' };
const ROLE_CLASS = { owner: 'role-owner', technician: 'role-technician', viewer: 'role-viewer' };

async function renderChoose(app) {
  setHdr('Hallo, ' + USER.name, 'Kies een zwembad');
  app.innerHTML = '<div class="loading-block"><div class="sp"></div></div>';
  try {
    const pools = window._USER_POOLS || (await call('my_zwembaden&user_token=' + encodeURIComponent(getParam('m')))).zwembaden || [];
    const poolRows = pools.map(z => {
      const rLabel = ROLE_LABEL[z.role] || z.role || 'Monteur';
      const rClass = ROLE_CLASS[z.role] || 'role-technician';
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:.75rem 0;border-bottom:1px solid var(--bd)">
        <div>
          <div style="font-weight:600">${esc(z.name)}<span class="role-badge ${rClass}">${rLabel}</span></div>
          <div style="font-size:12px;color:var(--t3)">${esc(z.code)} · ${esc(z.address||'')}</div>
        </div>
        <button class="btn btn-sm" onclick="pickZwembad('${esc(z.qr_token)}','${esc(z.role||'technician')}')">Kies</button>
      </div>`;
    }).join('');

    app.innerHTML = `
      <div class="card">
        <h2>Mijn zwembaden</h2>
        ${pools.length ? poolRows : '<p style="color:var(--t3);font-size:13px">Nog geen zwembaden gekoppeld.</p>'}
      </div>
      <div class="card">
        <h2>Zwembad toevoegen</h2>
        <p style="font-size:13px;color:var(--t2);margin-bottom:.75rem">Voeg jouw eigen zwembad toe en word eigenaar.</p>
        <div class="fg"><label>Naam zwembad *</label><input id="ap-name" placeholder="Mijn tuin zwembad"></div>
        <div class="fg"><label>Adres</label><input id="ap-addr" placeholder="Hoofdstraat 1, Amsterdam"></div>
        <div class="fg"><label>Type</label>
          <select id="ap-type">
            <option>Privé buitenbad</option><option>Privé binnenbad</option>
            <option>Privé spa</option><option>Hotel binnenbad</option><option>Hotel buitenbad</option>
          </select>
        </div>
        <div class="fg"><label>Volume (liter)</label><input id="ap-vol" type="number" placeholder="40000" value="40000"></div>
        <button class="btn" onclick="doAddMyPool()">Zwembad aanmaken</button>
      </div>
      <div class="card"><h2>Of zoek op poolcode</h2>
        <div class="fg"><input class="code-input" id="ci2" maxlength="8" placeholder="PXXXXX" oninput="this.value=this.value.toUpperCase()"></div>
        <button class="btn btn-out" onclick="lookupCode('ci2')">Zoeken</button>
      </div>`;
  } catch(e) { app.innerHTML = `<div class="state"><div class="state-sub">Fout: ${esc(e.message)}</div></div>`; }
}

function pickZwembad(token, role) {
  saveParam('k', token);
  if (role) saveParam('role', role);
  location.href = '?k=' + encodeURIComponent(token) + '&uc=' + encodeURIComponent(getParam('uc') || '') + '&m=' + encodeURIComponent(getParam('m') || '');
}

async function lookupCode(inputId) {
  const code = document.getElementById(inputId).value.trim().toUpperCase();
  if (!code) return;
  try {
    const d = await call('zwembad&code=' + encodeURIComponent(code) + '&user_token=' + encodeURIComponent(getParam('m')));
    ZWEMBAD = d.zwembad;
    saveParam('k', ZWEMBAD.qr_token || '');
    render();
  } catch(e) { toast(e.message.includes('toegang') ? 'Niet publiek — log eerst in.' : 'Niet gevonden.', true); }
}

async function loginWithCodes() {
  const poolCode = (document.getElementById('ci')?.value || '').trim().toUpperCase();
  const userCode = (document.getElementById('ui')?.value || '').trim().toUpperCase();
  if (!poolCode && !userCode) return toast('Voer minimaal een pool- of gebruikerscode in', true);

  // Log user in als code gegeven
  if (userCode && userCode.startsWith('U')) {
    try {
      const d = await call('login_user_code', 'POST', { user_code: userCode });
      USER = d.user;
      saveParam('uc', userCode);
      if (d.magic_token) saveParam('m', d.magic_token);
      if (d.pools) window._USER_POOLS = d.pools;
    } catch(e) { return toast('Gebruikerscode niet gevonden', true); }
  }

  // Laad pool als code gegeven
  if (poolCode && poolCode.startsWith('P')) {
    try {
      const d = await call('zwembad&code=' + encodeURIComponent(poolCode) + '&user_token=' + encodeURIComponent(getParam('m')));
      ZWEMBAD = d.zwembad;
      saveParam('k', ZWEMBAD.qr_token || '');
      if (USER && window._USER_POOLS) {
        const match = window._USER_POOLS.find(p => p.id === ZWEMBAD.id);
        USER_ROLE = match ? match.role : 'technician';
      }
    } catch(e) { return toast('Poolcode niet gevonden', true); }
  }

  render();
}

function renderFull(app) {
  setHdr(ZWEMBAD.name, USER.name);

const PARAMS = [

    cells:[

    ]},
  { key:'chlorine',   label:'Chloor (ppm)',fid:'f-cl',   min:0,   max:10,  step:.5, dec:1, def:1.5,
    cells:[
      {v:0,  c:'#FFFFFF',t:'#999'},{v:0.5,c:'#F0E8FF',t:'#333'},
      {v:1,  c:'#D8B8F0',t:'#333'},{v:3,  c:'#A060CC',t:'#fff'},

    ]},

    cells:[
      {v:0,  c:'#E8E820',t:'#333'},{v:40, c:'#B0B820',t:'#333'},
      {v:80, c:'#7A8A10',t:'#fff'},{v:120,c:'#406820',t:'#fff'},

      {v:50, c:'#D8B0EE',t:'#333'},{v:100,c:'#B070D8',t:'#fff'},
      {v:150,c:'#8840B0',t:'#fff'},{v:300,c:'#4C1878',t:'#fff'}
    ]},
];

function paramCard(p) {
  const v   = p.def;
  const pct = ((v - p.min) / (p.max - p.min) * 100).toFixed(1);
  const cells = p.cells.map(c =>
    `<div class="ref-cell" style="background:${c.c}" title="${c.v}">
       <span class="ref-cell-val" style="color:${c.t}">${c.v}</span>
     </div>`
  ).join('');
  return `<div class="strip-param">
    <div class="strip-param-label">${p.label}</div>
    <div class="crop-row">
      <div class="pad-crop-wrap" id="pw-${p.key}">
        <canvas id="cp-${p.key}" width="60" height="42"></canvas>
        <span>Jouw strip</span>
      </div>
      <div class="ref-crop-wrap" id="rw-${p.key}">
        <canvas id="cr-${p.key}" width="60" height="42"></canvas>
        <span>Kleurentabel</span>
      </div>
    </div>
    <div class="strip-param-val" id="vv-${p.key}">${v.toFixed(p.dec)}</div>
    <div class="ref-cells">${cells}</div>
    <input type="range" id="sl-${p.key}" min="${p.min}" max="${p.max}" step="${p.step}" value="${v}"
      style="background:linear-gradient(to right,var(--g) ${pct}%,var(--bd) ${pct}%)"
      oninput="onSlider('${p.key}',${p.dec},'${p.fid}')">
    <div class="strip-reasoning" id="rz-${p.key}"></div>
  </div>`;
}

function applyAIToSliders(d) {
  document.getElementById('ai-badge').style.display = 'inline';
  PARAMS.forEach(p => {
    const r = d[p.key];
    if (!r) return;
    const v = r.value;
    // Slider + waarde
    const sl = document.getElementById('sl-' + p.key);
    if (sl) {
      sl.value = v;
      const pct = ((v - parseFloat(sl.min)) / (parseFloat(sl.max) - parseFloat(sl.min)) * 100).toFixed(1);
      sl.style.background = `linear-gradient(to right,var(--g) ${pct}%,var(--bd) ${pct}%)`;
    }
    const vd = document.getElementById('vv-' + p.key);
    if (vd) vd.textContent = v.toFixed(p.dec);
    setVal(p.fid, v.toFixed(p.dec));
    // Redenering
    const rz = document.getElementById('rz-' + p.key);
    if (rz) rz.textContent = r.reasoning || '';
  });
  // Teken crops nadat AI_IMG geladen is
  PARAMS.forEach(p => doCrop(p.key));
}

// ── Strip foto + AI ───────────────────────────────────────────
async function onStripPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const inner  = document.getElementById('strip-inner');
  const status = document.getElementById('ai-status');
  inner.innerHTML  = '<div class="sp"></div><div style="font-size:12px;color:var(--t2);margin-top:6px">Uploaden...</div>';
  status.innerHTML = '';
  try {
    const url = await uploadFile(file);
    extraPhotos.strip = url;
    inner.innerHTML = `<img src="${url}" class="photo-preview">`;
    status.innerHTML = '<div class="loading-block"><div class="sp"></div><p style="margin-top:6px;font-size:13px">AI analyseert strip...</p></div>';

    const b64 = await toB64(file);
    const d   = await call('ai_strip', 'POST', { image: b64, type: file.type });
    AI_RESULT = d;

    AI_IMG = new Image();
    AI_IMG.src = url;
    await new Promise(r => { AI_IMG.onload = r; AI_IMG.onerror = r; });

    status.innerHTML = '';
    applyAIToSliders(d);
  } catch(e) {
    inner.innerHTML  = `<div style="color:var(--bad);font-size:13px">Analyseren mislukt: ${esc(e.message)}</div>`;
    status.innerHTML = '';
  }
}

function setVal(id, v) { const el = document.getElementById(id); if (el) el.value = v; }

function onSlider(key, dec, fid) {
  const sl  = document.getElementById('sl-' + key);
  const v   = parseFloat(sl.value);
  const pct = Math.round((v - parseFloat(sl.min)) / (parseFloat(sl.max) - parseFloat(sl.min)) * 100);
  sl.style.background = `linear-gradient(to right,var(--g) ${pct}%,var(--bd) ${pct}%)`;
  document.getElementById('vv-' + key).textContent = v.toFixed(dec);
  setVal(fid, v.toFixed(dec));
}

function doCrop(key) {
  if (!AI_IMG?.complete || !AI_RESULT) return;
  const r = AI_RESULT[key];
  if (r?.pad_bbox) {
    cropCanvas('cp-' + key, r.pad_bbox);
    const pw = document.getElementById('pw-' + key);
    if (pw) pw.style.display = 'block';
  }
  if (r?.ref_bbox) {
    cropCanvas('cr-' + key, r.ref_bbox);
    const rw = document.getElementById('rw-' + key);
    if (rw) rw.style.display = 'block';
  }
}

function cropCanvas(id, bbox) {
  const c = document.getElementById(id);
  if (!c || !bbox || !AI_IMG) return;
  const iw = AI_IMG.naturalWidth, ih = AI_IMG.naturalHeight;
  const x1 = bbox[0]/100*iw, y1 = bbox[1]/100*ih;
  const bw = Math.max(1,(bbox[2]-bbox[0])/100*iw);
  const bh = Math.max(1,(bbox[3]-bbox[1])/100*ih);
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  ctx.drawImage(AI_IMG, x1, y1, bw, bh, 0, 0, c.width, c.height);
}

// ── Extra foto's ──────────────────────────────────────────────
async function uploadExtra(input, key) {
  const file = input.files[0];
  if (!file) return;
  const pr = document.getElementById('pr-' + key);
  pr.innerHTML = '<div class="sp"></div>';
  try {
    extraPhotos[key] = await uploadFile(file);
    pr.innerHTML = `<img src="${extraPhotos[key]}" class="photo-preview">`;
  } catch(e) { toast('Upload mislukt', true); pr.innerHTML = '<div style="color:var(--bad);font-size:12px">Mislukt</div>'; }
}

async function uploadFile(file) {
  const fd = new FormData();
  fd.append('photo', file);
  const r = await fetch(`${API}?action=upload_photo`, { method:'POST', body:fd });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error);
  return d.url;
}

function toB64(file) {
  return new Promise((res,rej) => {
    const reader = new FileReader();
    reader.onload  = e => res(e.target.result.split(',')[1]);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

// ── Helpers ───────────────────────────────────────────────────
function setHdr(title, sub) {
  document.getElementById('hdr-title').textContent = title;
  document.getElementById('hdr-sub').textContent   = sub;
}
function valChips(v) {
  const cc = [
    { l:`pH ${v.ph}`,         ok:v.ph>=7.2&&v.ph<=7.6,      w:v.ph>=6.8&&v.ph<=8.0 },
    { l:`Cl ${v.chlorine}`,   ok:v.chlorine>=1&&v.chlorine<=3, w:v.chlorine>=0.5 },
    { l:`Alk ${v.alkalinity}`,ok:v.alkalinity>=80&&v.alkalinity<=120, w:v.alkalinity>=60&&v.alkalinity<=150 },
  ];
  if (v.stabilizer!=null) cc.push({ l:`Stab ${v.stabilizer}`,ok:v.stabilizer>=30&&v.stabilizer<=80,w:v.stabilizer>=20&&v.stabilizer<=100 });
  return cc.map(c=>`<span class="val-chip ${c.ok?'val-ok':c.w?'val-warn':'val-bad'}">${esc(c.l)}</span>`).join('');
}
function adviceHtml(a) {
  if (!a?.items?.length) return '';
  return a.items.filter(i=>i.level!=='ok').map(i=>`
    <div class="advice ${i.level}">
      <div class="advice-title">${esc(i.title)}</div>
      <div class="advice-body">${esc(i.finding)}</div>
      ${i.dose_today?`<div class="advice-dose">Vandaag: ${esc(i.dose_today)}</div>`:''}
      ${i.dose_next ?`<div class="advice-body" style="margin-top:3px">Volgende week: ${esc(i.dose_next)}</div>`:''}
    </div>`).join('');
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
let toastTimer;
function toast(msg, err=false) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.background = err?'#c0392b':'#111';
  el.classList.add('on'); clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('on'), err?5000:3000);
}

// ── QR code genereren ─────────────────────────────────────────
function showQR(containerId, url) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '';
  if (typeof QRCode !== 'undefined') {
    new QRCode(el, { text: url, width: 160, height: 160, correctLevel: QRCode.CorrectLevel.M });
  } else {
    el.innerHTML = `<p style="font-size:11px;word-break:break-all;color:var(--t2)">${esc(url)}</p>`;
  }
}

      </div>
      <div class="fg"><label>Volume (liter)</label><input id="np-vol" type="number" value="40000"></div>
      <button class="btn" onclick="doAddMyPool('np-name','np-addr','np-type','np-vol')">Zwembad aanmaken</button>
      <button class="btn btn-out" style="margin-top:8px" onclick="render()">Later doen</button>
    </div>`;
  setTimeout(() => showQR('qr-user', profileUrl), 100);
}

// ── Zwembad toevoegen (eigenaar) ──────────────────────────────
async function doAddMyPool(nameId='ap-name', addrId='ap-addr', typeId='ap-type', volId='ap-vol') {
  const name = (document.getElementById(nameId)?.value || '').trim();
  if (name.length < 2) return toast('Vul een naam in voor het zwembad', true);
  const token = getParam('uc') || getParam('m') || '';
  const isCode = token.startsWith('U');
  const body = {
    name,
    address:      document.getElementById(addrId)?.value || '',
    pool_type:    document.getElementById(typeId)?.value || 'Privé buitenbad',
    volume_liters: parseInt(document.getElementById(volId)?.value) || 40000,
    [isCode ? 'user_code' : 'user_token']: token,
  };
  try {
    const d = await call('add_my_pool', 'POST', body);
    ZWEMBAD = { id: d.id, code: d.code, name, qr_token: d.qr_token, address: body.address };
    USER_ROLE = 'owner';
    saveParam('k', d.qr_token);
    saveParam('role', 'owner');
    if (!window._USER_POOLS) window._USER_POOLS = [];
    window._USER_POOLS.push({ id: d.id, code: d.code, name, qr_token: d.qr_token, role: 'owner' });
    renderPoolSuccess(d.code, d.qr_url, name);
  } catch(e) { toast(e.message, true); }
}

function renderPoolSuccess(code, qrUrl, poolName) {
  const app = document.getElementById('app');
  setHdr(poolName, 'Zwembad aangemaakt');
  app.innerHTML = `
    <div class="card" style="text-align:center">
      <h2>Jouw poolcode</h2>
      <p style="font-size:13px;color:var(--t2);margin-bottom:.5rem">Deel deze code of QR met monteurs en gasten.</p>
      <div class="code-big">${esc(code)}</div>
      <div class="qr-wrap" id="qr-pool"></div>
      <div class="share-row">
        <button class="share-btn wa" onclick="shareLink('${qrUrl}','Bekijk ${poolName}','Scan de QR of gebruik deze link voor ${poolName}: ${qrUrl}')">WhatsApp</button>
        <button class="share-btn mail" onclick="shareLink('${qrUrl}','${poolName} op PoolCheck','')">E-mail</button>
        <button class="share-btn" onclick="navigator.clipboard?.writeText('${qrUrl}');toast('Link gekopieerd!')">Kopieer</button>
      </div>
    </div>
    <div class="card" style="text-align:center">
      <button class="btn" onclick="render()">Doorgaan naar zwembad</button>
    </div>`;
  setTimeout(() => showQR('qr-pool', qrUrl), 100);
}

// ── Eigenaar tab: QR + uitnodigingen ─────────────────────────
function buildMyPool() {
  const el = document.getElementById('v-mypool');
  if (!el) return;
  const baseUrl = location.origin + location.pathname;
  const qrUrl = baseUrl + '?k=' + (ZWEMBAD.qr_token || '');
  el.innerHTML = `
    <div class="card" style="text-align:center">
      <h2>QR-code zwembad</h2>
      <p style="font-size:13px;color:var(--t2);margin-bottom:.5rem">Scan om direct het zwembad te openen.</p>
      <div class="qr-wrap" id="qr-mypool"></div>
      <div class="code-big" style="font-size:18px">${esc(ZWEMBAD.code)}</div>
      <div class="share-row">
        <button class="share-btn wa" onclick="shareLink('${qrUrl}','${esc(ZWEMBAD.name)}','Bekijk ${esc(ZWEMBAD.name)} via PoolCheck Pro: ${qrUrl}')">WhatsApp</button>
        <button class="share-btn mail" onclick="shareLink('${qrUrl}','${esc(ZWEMBAD.name)}','')">E-mail</button>
        <button class="share-btn" onclick="navigator.clipboard?.writeText('${qrUrl}');toast('Link gekopieerd!')">Kopieer</button>
      </div>
    </div>
    <div class="card">
      <h2>Uitnodigen</h2>
      <p style="font-size:13px;color:var(--t2);margin-bottom:.75rem">Maak een uitnodigingslink aan voor een monteur of bekijker.</p>
      <div class="fg"><label>Rol</label>
        <select id="inv-role">
          <option value="technician">Monteur (kan rapporten invoeren)</option>
          <option value="viewer">Bekijker (alleen lezen)</option>
        </select>
      </div>
      <button class="btn" onclick="doCreateInvite()">Uitnodigingslink maken</button>
      <div id="invite-result" style="display:none;margin-top:1rem"></div>
    </div>`;
  setTimeout(() => showQR('qr-mypool', qrUrl), 100);
}

async function doCreateInvite() {
  const role = document.getElementById('inv-role')?.value || 'technician';
  const token = getParam('uc') || getParam('m') || '';
  const isCode = token.startsWith('U');
  try {
    const d = await call('create_invite', 'POST', {
      zwembad_id: ZWEMBAD.id,
      role,
      [isCode ? 'user_code' : 'user_token']: token,
    });
    const el = document.getElementById('invite-result');
    el.style.display = 'block';
    el.innerHTML = `
      <div class="qr-wrap" id="qr-invite"></div>
      <div style="font-size:11px;color:var(--t3);word-break:break-all;margin:.5rem 0">${esc(d.invite_url)}</div>
      <p style="font-size:11px;color:var(--t3)">Geldig t/m: ${d.expires_at?.substring(0,10)}</p>
      <div class="share-row">
        <button class="share-btn wa" onclick="shareLink('${d.invite_url}','Uitnodiging ${esc(ZWEMBAD.name)}','Je bent uitgenodigd voor ${esc(ZWEMBAD.name)} via PoolCheck Pro: ${d.invite_url}')">WhatsApp</button>
        <button class="share-btn mail" onclick="shareLink('${d.invite_url}','Uitnodiging ${esc(ZWEMBAD.name)}','')">E-mail</button>
        <button class="share-btn" onclick="navigator.clipboard?.writeText('${d.invite_url}');toast('Link gekopieerd!')">Kopieer</button>
      </div>`;
    setTimeout(() => showQR('qr-invite', d.invite_url), 100);
  } catch(e) { toast(e.message, true); }
}

// ── Uitnodiging accepteren ────────────────────────────────────
function renderInvite(token, app) {
  setHdr('Uitnodiging', 'Je bent uitgenodigd');
  app.innerHTML = `
    <div class="card">
      <h2>Uitnodiging accepteren</h2>
      <p style="font-size:13px;color:var(--t2);margin-bottom:1rem">
        Je bent uitgenodigd om een zwembad te volgen via PoolCheck Pro.
      </p>
      <h3 style="font-size:13px;font-weight:600;color:var(--t2);margin-bottom:.5rem">Heb je al een gebruikerscode?</h3>
      <div class="fg">
        <input class="code-input" id="inv-existing" maxlength="8" placeholder="UXXXXX"
               oninput="this.value=this.value.toUpperCase()">
      </div>
      <div class="or-divider">of registreer nieuw</div>
      <div class="fg"><label>Naam *</label><input id="inv-name" placeholder="Jan de Vries"></div>
      <div class="fg"><label>E-mail <span style="font-weight:400;color:var(--t3)">(optioneel)</span></label><input id="inv-email" type="email"></div>
      <button class="btn" style="margin-top:.25rem" onclick="doAcceptInvite('${token}')">Uitnodiging accepteren</button>
    </div>`;
}

async function doAcceptInvite(invToken) {
  const existingCode = (document.getElementById('inv-existing')?.value || '').trim().toUpperCase();
  const name  = (document.getElementById('inv-name')?.value || '').trim();
  const email = (document.getElementById('inv-email')?.value || '').trim();

  if (!existingCode && name.length < 2) return toast('Voer je naam in of een bestaande gebruikerscode', true);

  const body = { invite_token: invToken };
  if (existingCode) body.user_code = existingCode;
  else { body.name = name; body.email = email; }

  try {
    const d = await call('accept_invite', 'POST', body);
    USER = { code: d.user_code, name: name || existingCode, roles: 'user' };
    ZWEMBAD = d.pool;
    USER_ROLE = d.role || 'technician';
    saveParam('uc', d.user_code);
    if (d.magic_token) saveParam('m', d.magic_token);
    saveParam('k', d.pool.qr_token);
    saveParam('role', USER_ROLE);
    // Toon succes met gebruikerscode
    const app = document.getElementById('app');
    setHdr('Welkom!', ZWEMBAD.name);
    const profileUrl = location.origin + location.pathname + '?uc=' + d.user_code;
    app.innerHTML = `
      <div class="card" style="text-align:center">
        <h2>Gekoppeld aan ${esc(ZWEMBAD.name)}</h2>
        <p style="font-size:13px;color:var(--t2);margin-bottom:.5rem">Bewaar jouw gebruikerscode:</p>
        <div class="code-big">${esc(d.user_code)}</div>
        <div class="qr-wrap" id="qr-inv-user"></div>
        <div class="share-row">
          <button class="share-btn" onclick="shareLink('${profileUrl}','Mijn PoolCheck code','Mijn gebruikerscode is ${d.user_code}')">Deel mijn code</button>
          <button class="share-btn" onclick="navigator.clipboard?.writeText('${d.user_code}');toast('Code gekopieerd!')">Kopieer</button>
        </div>
      </div>
      <div class="card" style="text-align:center">
        <button class="btn" onclick="render()">Naar zwembad</button>
      </div>`;
    setTimeout(() => showQR('qr-inv-user', profileUrl), 100);
  } catch(e) { toast(e.message, true); }
}

boot();
</script>
</body>
</html>
