<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>PoolCheck Pro</title>
<style>
:root{
  --g:#1D9E75;--gd:#0F6E56;--gl:#E1F5EE;
  --bg:#f4f4f2;--s:#fff;--bd:rgba(0,0,0,.1);
  --t:#111;--t2:#555;--t3:#aaa;
  --r:14px;--rs:10px;
  --ok:#2d6a4f;--ok-bg:#eaf3de;
  --warn:#7a4f00;--warn-bg:#faeeda;
  --bad:#8b1c1c;--bad-bg:#fcebeb;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:2rem}
.hdr{background:var(--gd);padding:1rem 1.25rem;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.hdr-title{font-size:17px;font-weight:700;color:#fff}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:1px}
.wrap{max-width:480px;margin:0 auto;padding:1.25rem}
.card{background:var(--s);border-radius:var(--r);border:1px solid var(--bd);padding:1.25rem;margin-bottom:1rem}
.card h2{font-size:15px;font-weight:700;margin-bottom:1rem;color:var(--gd)}
.state{text-align:center;padding:3rem 1.5rem}
.state-icon{font-size:52px;margin-bottom:.75rem}
.state-title{font-size:18px;font-weight:700;color:var(--gd);margin-bottom:.5rem}
.state-sub{font-size:13px;color:var(--t2);line-height:1.7;max-width:300px;margin:0 auto 1.5rem}
.fg{margin-bottom:12px}
label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px}
input,select,textarea{width:100%;padding:11px 13px;border:1.5px solid var(--bd);border-radius:var(--rs);font-size:15px;background:#fff;color:var(--t);outline:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(29,158,117,.1)}
textarea{resize:vertical;min-height:70px;font-size:14px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:block;width:100%;padding:13px;background:var(--g);color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:700;cursor:pointer;text-align:center}
.btn:active{opacity:.85}
.btn-out{background:transparent;border:2px solid var(--g);color:var(--g)}
.btn-sm{display:inline-block;width:auto;padding:7px 14px;font-size:13px;font-weight:600;border-radius:8px}
.photo-zone{border:2px dashed var(--bd);border-radius:var(--rs);padding:1.25rem;text-align:center;cursor:pointer;transition:border-color .2s;position:relative;background:#fafaf8}
.photo-zone:hover{border-color:var(--g)}
.photo-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-preview{width:100%;border-radius:8px;margin-top:8px;max-height:200px;object-fit:cover}
/* AI strip */
.strip-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.strip-param{background:#fafaf8;border:1px solid var(--bd);border-radius:10px;padding:.75rem;text-align:center}
.strip-param-label{font-size:11px;font-weight:700;color:var(--t2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.strip-crops{display:flex;gap:6px;justify-content:center;margin-bottom:6px;align-items:flex-end}
.strip-crop{display:flex;flex-direction:column;align-items:center;gap:3px}
.strip-crop canvas{border-radius:5px;border:1.5px solid var(--bd);width:56px;height:40px}
.strip-crop span{font-size:10px;color:var(--t3)}
.strip-param-val{font-size:18px;font-weight:700;color:var(--gd);margin-bottom:4px}
.strip-reasoning{font-size:10px;color:var(--t3);line-height:1.4;margin-bottom:6px}
input[type=range]{width:100%;height:4px;-webkit-appearance:none;appearance:none;background:linear-gradient(to right,var(--g) 50%,var(--bd) 50%);border-radius:2px;outline:none;padding:0;border:none;box-shadow:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--g);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
/* Advice */
.advice{border-radius:10px;padding:.9rem 1rem;margin-bottom:.6rem;border-left:4px solid transparent}
.advice.ok  {background:var(--ok-bg); border-color:var(--ok)}
.advice.warn{background:var(--warn-bg);border-color:var(--warn)}
.advice.bad {background:var(--bad-bg); border-color:var(--bad)}
.advice-title{font-size:14px;font-weight:700}
.advice.ok   .advice-title{color:var(--ok)}
.advice.warn .advice-title{color:var(--warn)}
.advice.bad  .advice-title{color:var(--bad)}
.advice-body{font-size:13px;color:var(--t2);margin-top:4px;line-height:1.6}
.advice-dose{font-size:13px;font-weight:600;margin-top:5px}
/* History */
.visit-card{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:1rem;margin-bottom:.75rem}
.visit-date{font-size:12px;color:var(--t3);margin-bottom:.4rem}
.visit-vals{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.5rem}
.val-chip{font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px}
.val-ok{background:var(--ok-bg);color:var(--ok)}
.val-warn{background:var(--warn-bg);color:var(--warn)}
.val-bad{background:var(--bad-bg);color:var(--bad)}
.sp{width:22px;height:22px;border:3px solid var(--bd);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-block{text-align:center;padding:2rem;color:var(--t2);font-size:14px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.on{opacity:1}
.code-input{font-size:24px;letter-spacing:.15em;text-transform:uppercase;text-align:center;font-weight:700}
.pub-info{background:var(--gl);border:1px solid rgba(29,158,117,.2);border-radius:var(--rs);padding:.75rem 1rem;font-size:13px;color:var(--gd);margin-bottom:1rem}
.tabs{display:flex;background:#f0f0ee;border-radius:var(--rs);padding:3px;margin-bottom:1.25rem;gap:2px}
.tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;border:none;background:none;color:var(--t2)}
.tab.on{background:var(--s);color:var(--gd);box-shadow:0 1px 3px rgba(0,0,0,.08)}
</style>
</head>
<body>

<div class="hdr" id="hdr">
  <span style="font-size:24px">💧</span>
  <div>
    <div class="hdr-title" id="hdr-title">PoolCheck Pro</div>
    <div class="hdr-sub"   id="hdr-sub"></div>
  </div>
</div>

<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<script>
const API = 'api.php';
let USER    = null;
let ZWEMBAD = null;
let AI_RESULT = null;
let AI_IMG    = null;
const extraPhotos = { strip: '', chem: '', pool: '' };

// ── URL params + localStorage ─────────────────────────────────
function getParam(k) {
  return new URLSearchParams(location.search).get(k) || localStorage.getItem('pc_' + k) || '';
}
function saveParam(k, v) { if (v) localStorage.setItem('pc_' + k, v); }
function clearParam(k)   { localStorage.removeItem('pc_' + k); }

// ── API ───────────────────────────────────────────────────────
async function call(action, method = 'GET', body = null) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(`${API}?action=${action}`, opts);
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`);
  return d;
}

// ── Boot ──────────────────────────────────────────────────────
async function boot() {
  const p          = new URLSearchParams(location.search);
  const userToken  = p.get('m') || getParam('m');
  const poolToken  = p.get('k') || getParam('k');
  const poolCode   = (p.get('c') || '').toUpperCase();

  if (userToken) {
    try {
      const d = await call('get_user&token=' + encodeURIComponent(userToken));
      USER = d.user;
      saveParam('m', userToken);
    } catch (e) { clearParam('m'); }
  }

  if (poolToken || poolCode) {
    try {
      const q = poolToken
        ? 'zwembad&token=' + encodeURIComponent(poolToken) + '&user_token=' + encodeURIComponent(userToken || '')
        : 'zwembad&code='  + encodeURIComponent(poolCode)  + '&user_token=' + encodeURIComponent(userToken || '');
      const d = await call(q);
      ZWEMBAD = d.zwembad;
      saveParam('k', ZWEMBAD.qr_token || poolToken);
    } catch (e) { /* 403 of 404: zwembad niet laden */ }
  }

  render();
}

// ── Render ────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if      (!USER && !ZWEMBAD)  renderLanding(app);
  else if (ZWEMBAD && !USER)   renderPublic(app);
  else if (USER && !ZWEMBAD)   renderChoose(app);
  else                          renderFull(app);
}

// ── State 1: niets bekend ─────────────────────────────────────
function renderLanding(app) {
  setHdr('PoolCheck Pro', '');
  app.innerHTML = `
    <div class="state">
      <div class="state-icon">💧</div>
      <div class="state-title">PoolCheck Pro</div>
      <div class="state-sub">Scan de QR-code op het zwembad of open jouw persoonlijke link.</div>
    </div>
    <div class="card">
      <h2>Zoek op poolcode</h2>
      <div class="fg"><label>Poolcode (op de QR-sticker)</label>
        <input class="code-input" id="ci" maxlength="6" placeholder="PA0" oninput="this.value=this.value.toUpperCase()">
      </div>
      <button class="btn" onclick="lookupCode('ci')">Zoeken</button>
    </div>`;
}

// ── State 2: zwembad publiek, geen user ───────────────────────
function renderPublic(app) {
  setHdr(ZWEMBAD.name, ZWEMBAD.address || '');
  app.innerHTML = `
    <div class="pub-info">Publieke weergave — laatste testresultaat</div>
    <div id="pub-last"><div class="loading-block"><div class="sp"></div></div></div>
    <div class="card" style="text-align:center">
      <p style="font-size:13px;color:var(--t2);margin-bottom:12px">Monteur? Gebruik jouw persoonlijke link voor volledige toegang.</p>
      <div class="fg"><input id="ut-in" placeholder="Plak jouw toegangslink hier..."></div>
      <button class="btn btn-out" onclick="applyUserToken()">Inloggen</button>
    </div>`;
  loadPublicLast();
}

async function loadPublicLast() {
  const el = document.getElementById('pub-last');
  if (!el) return;
  try {
    const d = await call('zwembad_history&token=' + encodeURIComponent(getParam('k')));
    const v = (d.visits || [])[0];
    if (!v) { el.innerHTML = '<div class="card"><p style="color:var(--t3);font-size:14px;text-align:center;padding:.5rem">Nog geen testresultaten.</p></div>'; return; }
    el.innerHTML = `<div class="visit-card">
      <div class="visit-date">${v.visit_date}</div>
      <div class="visit-vals">${valChips(v)}</div>
      ${adviceHtml(v.advice_json)}
    </div>`;
  } catch (e) { el.innerHTML = ''; }
}

function applyUserToken() {
  let raw = document.getElementById('ut-in').value.trim();
  try { raw = new URL(raw).searchParams.get('m') || raw; } catch(e) {}
  if (!raw) return;
  saveParam('m', raw);
  location.href = '?m=' + encodeURIComponent(raw) + '&k=' + encodeURIComponent(getParam('k'));
}

// ── State 3: user bekend, geen zwembad ───────────────────────
async function renderChoose(app) {
  setHdr('Hallo, ' + USER.name, 'Kies een zwembad');
  app.innerHTML = '<div class="loading-block"><div class="sp"></div></div>';
  try {
    const d = await call('my_zwembaden&user_token=' + encodeURIComponent(getParam('m')));
    const zz = d.zwembaden || [];
    if (!zz.length) {
      app.innerHTML = `<div class="state"><div class="state-icon">🏊</div><div class="state-title">Geen zwembaden</div>
        <div class="state-sub">Je bent nog niet gekoppeld aan een zwembad. Vraag de beheerder.</div></div>`;
      return;
    }
    app.innerHTML = `
      <div class="card"><h2>Kies een zwembad</h2>${zz.map(z => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:.75rem 0;border-bottom:1px solid var(--bd)">
          <div><div style="font-weight:600">${esc(z.name)}</div>
          <div style="font-size:12px;color:var(--t3)">${esc(z.code)} · ${esc(z.address||'')}</div></div>
          <button class="btn btn-sm" onclick="pickZwembad('${esc(z.qr_token)}')">Kies</button>
        </div>`).join('')}
      </div>
      <div class="card"><h2>Of zoek op poolcode</h2>
        <div class="fg"><input class="code-input" id="ci2" maxlength="6" placeholder="PA0" oninput="this.value=this.value.toUpperCase()"></div>
        <button class="btn btn-out" onclick="lookupCode('ci2')">Zoeken</button>
      </div>`;
  } catch(e) { app.innerHTML = `<div class="state"><div class="state-sub">Fout: ${esc(e.message)}</div></div>`; }
}

function pickZwembad(token) {
  saveParam('k', token);
  location.href = '?m=' + encodeURIComponent(getParam('m')) + '&k=' + encodeURIComponent(token);
}

async function lookupCode(inputId) {
  const code = document.getElementById(inputId).value.trim();
  if (!code) return;
  try {
    const d = await call('zwembad&code=' + encodeURIComponent(code) + '&user_token=' + encodeURIComponent(getParam('m')));
    ZWEMBAD = d.zwembad;
    saveParam('k', ZWEMBAD.qr_token || '');
    render();
  } catch(e) { toast(e.message.includes('toegang') ? 'Niet publiek — log eerst in.' : 'Niet gevonden.', true); }
}

// ── State 4: volledige toegang ────────────────────────────────
function renderFull(app) {
  setHdr(ZWEMBAD.name, USER.name);
  app.innerHTML = `
    <div class="tabs">
      <button class="tab on" data-v="form"    onclick="switchTab(this)">Test invoeren</button>
      <button class="tab"    data-v="history" onclick="switchTab(this)">Geschiedenis</button>
    </div>
    <div id="v-form"></div>
    <div id="v-history" style="display:none"></div>`;
  buildForm();
  loadHistory();
}

function switchTab(btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('v-form').style.display    = btn.dataset.v === 'form'    ? '' : 'none';
  document.getElementById('v-history').style.display = btn.dataset.v === 'history' ? '' : 'none';
}

// ── Formulier ─────────────────────────────────────────────────
function buildForm() {
  document.getElementById('v-form').innerHTML = `
    <div class="card">
      <h2>Teststrip analyseren</h2>
      <p style="font-size:13px;color:var(--t2);margin-bottom:12px">
        Maak één foto van de teststrip <strong>naast</strong> de kleurenkaart. Beide moeten goed zichtbaar zijn.
      </p>
      <div class="photo-zone" id="strip-zone">
        <input type="file" accept="image/*" capture="environment" onchange="onStripPhoto(this)">
        <div id="strip-inner">
          <div style="font-size:28px;margin-bottom:6px">📷</div>
          <div style="font-size:14px;font-weight:600;color:var(--t2)">Foto maken of uploaden</div>
          <div style="font-size:12px;color:var(--t3);margin-top:2px">Teststrip + kleurenkaart naast elkaar</div>
        </div>
      </div>
      <div id="ai-out" style="margin-top:1rem"></div>
    </div>

    <div class="card">
      <h2>Metingen</h2>
      <div class="row2">
        <div class="fg"><label>pH</label><input type="number" id="f-ph"  step="0.1" min="6" max="9"   placeholder="7.4"></div>
        <div class="fg"><label>Chloor (ppm)</label><input type="number" id="f-cl"  step="0.1" min="0" max="10"  placeholder="1.5"></div>
      </div>
      <div class="row2">
        <div class="fg"><label>Alkaliniteit (ppm)</label><input type="number" id="f-alk" step="1"   min="0" max="300" placeholder="100"></div>
        <div class="fg"><label>Stabilizer (ppm)</label><input type="number" id="f-stab" step="1"   min="0" max="300" placeholder="40"></div>
      </div>
      <div class="fg"><label>Volume water (liter)</label>
        <input type="number" id="f-vol" value="${ZWEMBAD.volume_liters || 40000}">
      </div>
      <div class="fg"><label>Notities</label><textarea id="f-notes" placeholder="Bijzonderheden..."></textarea></div>
    </div>

    <div class="card">
      <h2>Bevestigingsfoto's</h2>
      <div class="fg"><label>Chemicaliën toegevoegd</label>
        <div class="photo-zone"><input type="file" accept="image/*" capture="environment" onchange="uploadExtra(this,'chem')">
          <div id="pr-chem"><div style="font-size:22px">📷</div><div style="font-size:13px;color:var(--t3)">Foto maken</div></div>
        </div>
      </div>
      <div class="fg"><label>Zwembad na behandeling</label>
        <div class="photo-zone"><input type="file" accept="image/*" capture="environment" onchange="uploadExtra(this,'pool')">
          <div id="pr-pool"><div style="font-size:22px">📷</div><div style="font-size:13px;color:var(--t3)">Foto maken</div></div>
        </div>
      </div>
    </div>

    <button class="btn" id="save-btn" onclick="doSave()">Bezoek opslaan</button>`;
}

// ── Strip foto + AI ───────────────────────────────────────────
async function onStripPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const inner = document.getElementById('strip-inner');
  inner.innerHTML = '<div class="sp"></div><div style="font-size:12px;color:var(--t2);margin-top:6px">Uploaden...</div>';
  try {
    const url = await uploadFile(file);
    extraPhotos.strip = url;
    inner.innerHTML = `<img src="${url}" class="photo-preview">`;

    const aiOut = document.getElementById('ai-out');
    aiOut.innerHTML = '<div class="loading-block"><div class="sp"></div><p style="margin-top:8px">AI analyseert strip...</p></div>';

    const b64 = await toB64(file);
    const d   = await call('ai_strip', 'POST', { image: b64, type: file.type });
    AI_RESULT = d;

    AI_IMG = new Image();
    AI_IMG.src = url;
    await new Promise(r => { AI_IMG.onload = r; AI_IMG.onerror = r; });

    renderAI(aiOut);
    // Vul formulier in
    if (d.ph)         setVal('f-ph',   d.ph.value);
    if (d.chlorine)   setVal('f-cl',   d.chlorine.value);
    if (d.alkalinity) setVal('f-alk',  d.alkalinity.value);
    if (d.stabilizer) setVal('f-stab', d.stabilizer.value);
  } catch(e) {
    inner.innerHTML = `<div style="color:var(--bad);font-size:13px">Analyseren mislukt: ${esc(e.message)}</div>`;
    document.getElementById('ai-out').innerHTML = '';
  }
}

function setVal(id, v) { const el = document.getElementById(id); if (el) el.value = v; }

function renderAI(el) {
  const params = [
    { key:'ph',         label:'pH',          fid:'f-ph',   min:6,   max:9,   step:.1, dec:1 },
    { key:'chlorine',   label:'Chloor (ppm)',fid:'f-cl',   min:0,   max:10,  step:.1, dec:1 },
    { key:'alkalinity', label:'Alk. (ppm)',  fid:'f-alk',  min:0,   max:300, step:1,  dec:0 },
    { key:'stabilizer', label:'Stabilizer',  fid:'f-stab', min:0,   max:200, step:1,  dec:0 },
  ];
  el.innerHTML = `
    <div style="font-size:13px;font-weight:600;color:var(--gd);margin-bottom:8px">AI-resultaat — controleer en pas aan indien nodig</div>
    <div class="strip-grid">${params.map(p => paramCard(p)).join('')}</div>
    <div style="font-size:11px;color:var(--t3);text-align:center;margin-bottom:4px">Schuif de slider om een waarde bij te stellen</div>`;
  params.forEach(p => doCrop(p.key));
}

function paramCard(p) {
  const r = AI_RESULT?.[p.key];
  if (!r) return '';
  const v   = r.value;
  const pct = Math.round((v - p.min) / (p.max - p.min) * 100);
  return `<div class="strip-param">
    <div class="strip-param-label">${p.label}</div>
    <div class="strip-crops">
      <div class="strip-crop"><canvas id="cp-${p.key}" width="56" height="40"></canvas><span>Strip</span></div>
      <div style="font-size:14px;color:var(--t3);align-self:center">↔</div>
      <div class="strip-crop"><canvas id="cr-${p.key}" width="56" height="40"></canvas><span>Referentie</span></div>
    </div>
    <div class="strip-param-val" id="vv-${p.key}">${typeof v==='number'?v.toFixed(p.dec):v}</div>
    <div class="strip-reasoning">${esc(r.reasoning||'')}</div>
    <input type="range" id="sl-${p.key}" min="${p.min}" max="${p.max}" step="${p.step}" value="${v}"
      style="background:linear-gradient(to right,var(--g) ${pct}%,var(--bd) ${pct}%)"
      oninput="onSlider('${p.key}',${p.dec},'${p.fid}')">
  </div>`;
}

function onSlider(key, dec, fid) {
  const sl  = document.getElementById('sl-' + key);
  const v   = parseFloat(sl.value);
  const pct = Math.round((v - parseFloat(sl.min)) / (parseFloat(sl.max) - parseFloat(sl.min)) * 100);
  sl.style.background = `linear-gradient(to right,var(--g) ${pct}%,var(--bd) ${pct}%)`;
  document.getElementById('vv-' + key).textContent = v.toFixed(dec);
  setVal(fid, v.toFixed(dec));
}

function doCrop(key) {
  if (!AI_IMG?.complete || !AI_RESULT) return;
  const r = AI_RESULT[key];
  if (!r) return;
  cropCanvas('cp-' + key, r.pad_bbox);
  cropCanvas('cr-' + key, r.ref_bbox);
}

function cropCanvas(id, bbox) {
  const c = document.getElementById(id);
  if (!c || !bbox || !AI_IMG) return;
  const iw = AI_IMG.naturalWidth, ih = AI_IMG.naturalHeight;
  const x1 = bbox[0]/100*iw, y1 = bbox[1]/100*ih;
  const bw = Math.max(1,(bbox[2]-bbox[0])/100*iw);
  const bh = Math.max(1,(bbox[3]-bbox[1])/100*ih);
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  ctx.drawImage(AI_IMG, x1, y1, bw, bh, 0, 0, c.width, c.height);
}

// ── Extra foto's ──────────────────────────────────────────────
async function uploadExtra(input, key) {
  const file = input.files[0];
  if (!file) return;
  const pr = document.getElementById('pr-' + key);
  pr.innerHTML = '<div class="sp"></div>';
  try {
    extraPhotos[key] = await uploadFile(file);
    pr.innerHTML = `<img src="${extraPhotos[key]}" class="photo-preview">`;
  } catch(e) { toast('Upload mislukt', true); pr.innerHTML = '<div style="color:var(--bad);font-size:12px">Mislukt</div>'; }
}

async function uploadFile(file) {
  const fd = new FormData();
  fd.append('photo', file);
  const r = await fetch(`${API}?action=upload_photo`, { method:'POST', body:fd });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error);
  return d.url;
}

function toB64(file) {
  return new Promise((res,rej) => {
    const reader = new FileReader();
    reader.onload  = e => res(e.target.result.split(',')[1]);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

// ── Bezoek opslaan ────────────────────────────────────────────
async function doSave() {
  const ph  = parseFloat(document.getElementById('f-ph').value);
  const cl  = parseFloat(document.getElementById('f-cl').value);
  const alk = parseInt(document.getElementById('f-alk').value);
  if (isNaN(ph)||isNaN(cl)||isNaN(alk)) return toast('Vul pH, chloor en alkaliniteit in.', true);

  const btn = document.getElementById('save-btn');
  btn.textContent = 'Opslaan...'; btn.disabled = true;
  try {
    const d = await call('save_visit', 'POST', {
      zwembad_id: ZWEMBAD.id, user_id: USER.id,
      ph, chlorine: cl, alkalinity: alk,
      stabilizer: document.getElementById('f-stab').value || null,
      volume_used: parseInt(document.getElementById('f-vol').value) || ZWEMBAD.volume_liters,
      notes: document.getElementById('f-notes').value,
      strip_photo: extraPhotos.strip,
      confirm_photo_chemicals: extraPhotos.chem,
      confirm_photo_pool: extraPhotos.pool,
    });
    document.getElementById('v-form').innerHTML = `
      <div class="card" style="text-align:center;padding:2rem">
        <div style="font-size:36px;margin-bottom:.5rem">✅</div>
        <div style="font-size:17px;font-weight:700;color:var(--gd);margin-bottom:.25rem">Bezoek opgeslagen!</div>
        <div style="font-size:13px;color:var(--t2);margin-bottom:1.25rem">E-mail ${d.mail_results?.any_sent?'verstuurd':'kon niet verstuurd worden'}.</div>
        <button class="btn" style="max-width:200px;margin:0 auto" onclick="location.reload()">Nieuw bezoek</button>
      </div>`;
    loadHistory();
  } catch(e) {
    toast('Opslaan mislukt: ' + e.message, true);
    btn.textContent = 'Bezoek opslaan'; btn.disabled = false;
  }
}

// ── Geschiedenis ──────────────────────────────────────────────
async function loadHistory() {
  const el = document.getElementById('v-history');
  if (!el) return;
  el.innerHTML = '<div class="loading-block"><div class="sp"></div></div>';
  try {
    const d = await call('zwembad_history&token=' + encodeURIComponent(getParam('k')) + '&user_token=' + encodeURIComponent(getParam('m')));
    const visits = d.visits || [];
    el.innerHTML = !visits.length
      ? '<div style="text-align:center;color:var(--t3);padding:2rem;font-size:14px">Nog geen bezoeken.</div>'
      : visits.map(v => `<div class="visit-card">
          <div class="visit-date">${v.visit_date} ${(v.visit_time||'').slice(0,5)} · ${esc(v.user_name||'')}</div>
          <div class="visit-vals">${valChips(v)}</div>
          ${adviceHtml(v.advice_json)}
          ${v.notes?`<div style="font-size:12px;color:var(--t2);margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--bd)">${esc(v.notes)}</div>`:''}
        </div>`).join('');
  } catch(e) { el.innerHTML = `<div style="color:var(--bad);font-size:13px;padding:1rem">${esc(e.message)}</div>`; }
}

// ── Helpers ───────────────────────────────────────────────────
function setHdr(title, sub) {
  document.getElementById('hdr-title').textContent = title;
  document.getElementById('hdr-sub').textContent   = sub;
}
function valChips(v) {
  const cc = [
    { l:`pH ${v.ph}`,         ok:v.ph>=7.2&&v.ph<=7.6,      w:v.ph>=6.8&&v.ph<=8.0 },
    { l:`Cl ${v.chlorine}`,   ok:v.chlorine>=1&&v.chlorine<=3, w:v.chlorine>=0.5 },
    { l:`Alk ${v.alkalinity}`,ok:v.alkalinity>=80&&v.alkalinity<=120, w:v.alkalinity>=60&&v.alkalinity<=150 },
  ];
  if (v.stabilizer!=null) cc.push({ l:`Stab ${v.stabilizer}`,ok:v.stabilizer>=30&&v.stabilizer<=80,w:v.stabilizer>=20&&v.stabilizer<=100 });
  return cc.map(c=>`<span class="val-chip ${c.ok?'val-ok':c.w?'val-warn':'val-bad'}">${esc(c.l)}</span>`).join('');
}
function adviceHtml(a) {
  if (!a?.items?.length) return '';
  return a.items.filter(i=>i.level!=='ok').map(i=>`
    <div class="advice ${i.level}">
      <div class="advice-title">${esc(i.title)}</div>
      <div class="advice-body">${esc(i.finding)}</div>
      ${i.dose_today?`<div class="advice-dose">Vandaag: ${esc(i.dose_today)}</div>`:''}
      ${i.dose_next ?`<div class="advice-body" style="margin-top:3px">Volgende week: ${esc(i.dose_next)}</div>`:''}
    </div>`).join('');
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
let toastTimer;
function toast(msg, err=false) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.background = err?'#c0392b':'#111';
  el.classList.add('on'); clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('on'), err?5000:3000);
}

boot();
</script>
