<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>PoolCheck Pro</title>
<style>
:root{
  --g:#1D9E75;--gd:#0F6E56;--gl:#E1F5EE;
  --bg:#f4f4f2;--s:#fff;--bd:rgba(0,0,0,.1);
  --t:#111;--t2:#555;--t3:#aaa;
  --r:14px;--rs:10px;
  --ok:#2d6a4f;--ok-bg:#eaf3de;
  --warn:#7a4f00;--warn-bg:#faeeda;
  --bad:#8b1c1c;--bad-bg:#fcebeb;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:2rem}
.hdr{background:var(--gd);padding:1rem 1.25rem;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.hdr-title{font-size:17px;font-weight:700;color:#fff}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:1px}
.wrap{max-width:480px;margin:0 auto;padding:1.25rem}
.card{background:var(--s);border-radius:var(--r);border:1px solid var(--bd);padding:1.25rem;margin-bottom:1rem}
.card h2{font-size:15px;font-weight:700;margin-bottom:1rem;color:var(--gd)}
.state{text-align:center;padding:3rem 1.5rem}
.state-icon{font-size:52px;margin-bottom:.75rem}
.state-title{font-size:18px;font-weight:700;color:var(--gd);margin-bottom:.5rem}
.state-sub{font-size:13px;color:var(--t2);line-height:1.7;max-width:300px;margin:0 auto 1.5rem}
.fg{margin-bottom:12px}
label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px}
input,select,textarea{width:100%;padding:11px 13px;border:1.5px solid var(--bd);border-radius:var(--rs);font-size:15px;background:#fff;color:var(--t);outline:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(29,158,117,.1)}
textarea{resize:vertical;min-height:70px;font-size:14px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:block;width:100%;padding:13px;background:var(--g);color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:700;cursor:pointer;text-align:center}
.btn:active{opacity:.85}
.btn-out{background:transparent;border:2px solid var(--g);color:var(--g)}
.btn-sm{display:inline-block;width:auto;padding:7px 14px;font-size:13px;font-weight:600;border-radius:8px}
.photo-zone{border:2px dashed var(--bd);border-radius:var(--rs);padding:1.25rem;text-align:center;cursor:pointer;transition:border-color .2s;position:relative;background:#fafaf8}
.photo-zone:hover{border-color:var(--g)}
.photo-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-preview{width:100%;border-radius:8px;margin-top:8px;max-height:200px;object-fit:cover}
/* Metingen slider UI */
.strip-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:.5rem}
.strip-param{background:#fafaf8;border:1px solid var(--bd);border-radius:10px;padding:.75rem;text-align:center}
.strip-param-label{font-size:11px;font-weight:700;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.pad-crop-wrap{display:none;margin-bottom:6px;text-align:center}
.pad-crop-wrap canvas{border-radius:5px;border:1.5px solid var(--bd);width:60px;height:42px;display:block;margin:0 auto 2px}
.pad-crop-wrap span{font-size:9px;color:var(--t3);display:block}
.strip-param-val{font-size:20px;font-weight:700;color:var(--gd);margin-bottom:5px;line-height:1}
.ref-cells{display:flex;border-radius:5px;overflow:hidden;margin-bottom:5px;height:30px;border:1px solid var(--bd)}
.ref-cell{flex:1;display:flex;align-items:flex-end;justify-content:center;padding-bottom:2px;border-right:1px solid rgba(255,255,255,.35)}
.ref-cell:last-child{border-right:none}
.ref-cell-val{font-size:7.5px;font-weight:700;line-height:1}
.strip-reasoning{font-size:9.5px;color:var(--t3);line-height:1.4;margin-top:3px;min-height:0}
input[type=range]{width:100%;height:4px;-webkit-appearance:none;appearance:none;background:linear-gradient(to right,var(--g) 50%,var(--bd) 50%);border-radius:2px;outline:none;padding:0;border:none;box-shadow:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--g);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.vol-display{font-size:14px;color:var(--t2);padding:10px 13px;background:#f5f5f3;border-radius:var(--rs);border:1.5px solid var(--bd)}
/* Advice */
.advice{border-radius:10px;padding:.9rem 1rem;margin-bottom:.6rem;border-left:4px solid transparent}
.advice.ok  {background:var(--ok-bg); border-color:var(--ok)}
.advice.warn{background:var(--warn-bg);border-color:var(--warn)}
.advice.bad {background:var(--bad-bg); border-color:var(--bad)}
.advice-title{font-size:14px;font-weight:700}
.advice.ok   .advice-title{color:var(--ok)}
.advice.warn .advice-title{color:var(--warn)}
.advice.bad  .advice-title{color:var(--bad)}
.advice-body{font-size:13px;color:var(--t2);margin-top:4px;line-height:1.6}
.advice-dose{font-size:13px;font-weight:600;margin-top:5px}
/* History */
.visit-card{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:1rem;margin-bottom:.75rem}
.visit-date{font-size:12px;color:var(--t3);margin-bottom:.4rem}
.visit-vals{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.5rem}
.val-chip{font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px}
.val-ok{background:var(--ok-bg);color:var(--ok)}
.val-warn{background:var(--warn-bg);color:var(--warn)}
.val-bad{background:var(--bad-bg);color:var(--bad)}
.sp{width:22px;height:22px;border:3px solid var(--bd);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-block{text-align:center;padding:2rem;color:var(--t2);font-size:14px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.on{opacity:1}
.code-input{font-size:24px;letter-spacing:.15em;text-transform:uppercase;text-align:center;font-weight:700}
.pub-info{background:var(--gl);border:1px solid rgba(29,158,117,.2);border-radius:var(--rs);padding:.75rem 1rem;font-size:13px;color:var(--gd);margin-bottom:1rem}
.tabs{display:flex;background:#f0f0ee;border-radius:var(--rs);padding:3px;margin-bottom:1.25rem;gap:2px}
.tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;border:none;background:none;color:var(--t2)}
.tab.on{background:var(--s);color:var(--gd);box-shadow:0 1px 3px rgba(0,0,0,.08)}
/* ROI selection */
.roi-btn-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center}
.roi-btn{padding:7px 12px;font-size:12px;font-weight:700;border:2px solid;border-radius:8px;cursor:pointer;background:transparent;flex:1;min-width:80px;transition:all .15s}
.roi-btn.strip{border-color:#c89600;color:#c89600}
.roi-btn.strip.active,.roi-btn.strip:hover{background:#c89600;color:#fff}
.roi-btn.strip.done{background:#c89600;color:#fff}
.roi-btn.chart{border-color:#009eb0;color:#009eb0}
.roi-btn.chart.active,.roi-btn.chart:hover{background:#009eb0;color:#fff}
.roi-btn.chart.done{background:#009eb0;color:#fff}
button:disabled{opacity:.4;cursor:default}
.crot-btn{padding:4px 8px;font-size:10px;font-weight:600;border:1.5px solid #009eb0;border-radius:6px;background:transparent;color:#009eb0;cursor:pointer;white-space:nowrap}
.crot-btn.on{background:#009eb0;color:#fff}
/* Debug panel */
details summary{cursor:pointer;font-size:11px;color:var(--t3);padding:3px 0;user-select:none}
.dbg-row{margin-bottom:10px}
.dbg-row-title{font-size:10px;font-weight:700;color:var(--t2);margin-bottom:4px}
.dbg-cells{display:flex;gap:4px;flex-wrap:wrap;align-items:flex-end}
.dbg-cell{text-align:center;font-size:7.5px;color:var(--t3);line-height:1.35}
.dbg-cell canvas{display:block;border-radius:3px;border:1.5px solid transparent}
</style>
</head>
<body>

<div class="hdr" id="hdr">
  <span style="font-size:24px">💧</span>
  <div>
    <div class="hdr-title" id="hdr-title">PoolCheck Pro</div>
    <div class="hdr-sub"   id="hdr-sub"></div>
  </div>
</div>

<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<script>
const API = 'api.php';
let USER    = null;
let ZWEMBAD = null;
let AI_RESULT = null;
let AI_IMG    = null;
const extraPhotos = { strip: '', chem: '', pool: '' };

// ── Deterministische analyse globals ─────────────────────────
let ANALYZE_IMG    = null;   // full-res Image voor pixel sampling
let DISPLAY_CANVAS = null;   // zichtbare canvas (geschaald)
let DISPLAY_SCALE  = 1;      // display pixels / image pixels
let ROI            = { strip: null, chart: null }; // {x1,y1,x2,y2} in IMAGE pixels
let SEL_MODE       = null;   // 'strip' | 'chart' | null
let _selDrag       = null;
let _ANALYSIS_WC   = null;   // herbruikbare work-canvas context

// Aquachek 4-in-1: volgorde referentiekaart rijen (top → bottom op fles)
// = zelfde volgorde als PARAMS
const CHART_LAYOUT = [
  { key:'ph',         cols:5 },
  { key:'chlorine',   cols:6 },
  { key:'alkalinity', cols:6 },
  { key:'stabilizer', cols:5 },
];
// Volgorde strip pads (top → bottom, handvat onderaan)
const STRIP_PAD_ORDER = ['ph','chlorine','alkalinity','stabilizer'];
const SAMPLE_MARGIN   = 0.25; // 25% marge aan elke kant voor center-crop
let   CHART_ROT       = 0;   // 0=pH boven, 1=pH rechts, 2=pH onder, 3=pH links

// ── URL params + localStorage ─────────────────────────────────
function getParam(k) {
  return new URLSearchParams(location.search).get(k) || localStorage.getItem('pc_' + k) || '';
}
function saveParam(k, v) { if (v) localStorage.setItem('pc_' + k, v); }
function clearParam(k)   { localStorage.removeItem('pc_' + k); }

// ── API ───────────────────────────────────────────────────────
async function call(action, method = 'GET', body = null) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(`${API}?action=${action}`, opts);
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`);
  return d;
}

// ── Boot ──────────────────────────────────────────────────────
async function boot() {
  const p          = new URLSearchParams(location.search);
  const userToken  = p.get('m')  || '';
  const poolToken  = p.get('k')  || '';
  const poolCode   = (p.get('c') || '').toUpperCase();

  if (userToken) {
    try {
      const d = await call('get_user&token=' + encodeURIComponent(userToken));
      USER = d.user;
      saveParam('m', userToken);
    } catch (e) { clearParam('m'); }
  }

  if (poolToken || poolCode) {
    try {
      const q = poolToken
        ? 'zwembad&token=' + encodeURIComponent(poolToken) + '&user_token=' + encodeURIComponent(userToken || '')
        : 'zwembad&code='  + encodeURIComponent(poolCode)  + '&user_token=' + encodeURIComponent(userToken || '');
      const d = await call(q);
      ZWEMBAD = d.zwembad;
      saveParam('k', ZWEMBAD.qr_token || poolToken);
    } catch (e) { /* 403 of 404: zwembad niet laden */ }
  }

  render();
}

// ── Render ────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if      (!USER && !ZWEMBAD)  renderLanding(app);
  else if (ZWEMBAD && !USER)   renderPublic(app);
  else if (USER && !ZWEMBAD)   renderChoose(app);
  else                          renderFull(app);
}

// ── State 1: niets bekend ─────────────────────────────────────
function renderLanding(app) {
  setHdr('PoolCheck Pro', '');
  app.innerHTML = `
    <div class="state">
      <div class="state-icon">💧</div>
      <div class="state-title">PoolCheck Pro</div>
      <div class="state-sub">Scan de QR-code op het zwembad of open jouw persoonlijke link.</div>
    </div>
    <div class="card">
      <h2>Zoek op poolcode</h2>
      <div class="fg"><label>Poolcode (op de QR-sticker)</label>
        <input class="code-input" id="ci" maxlength="6" placeholder="PA0" oninput="this.value=this.value.toUpperCase()">
      </div>
      <button class="btn" onclick="lookupCode('ci')">Zoeken</button>
    </div>`;
}

// ── State 2: zwembad publiek, geen user ───────────────────────
function renderPublic(app) {
  setHdr(ZWEMBAD.name, ZWEMBAD.address || '');
  app.innerHTML = `
    <div class="pub-info">Publieke weergave — laatste testresultaat</div>
    <div id="pub-last"><div class="loading-block"><div class="sp"></div></div></div>
    <div class="card" style="text-align:center">
      <p style="font-size:13px;color:var(--t2);margin-bottom:12px">Monteur? Gebruik jouw persoonlijke link voor volledige toegang.</p>
      <div class="fg"><input id="ut-in" placeholder="Plak jouw toegangslink hier..."></div>
      <button class="btn btn-out" onclick="applyUserToken()">Inloggen</button>
    </div>`;
  loadPublicLast();
}

async function loadPublicLast() {
  const el = document.getElementById('pub-last');
  if (!el) return;
  try {
    const d = await call('zwembad_history&token=' + encodeURIComponent(getParam('k')));
    const v = (d.visits || [])[0];
    if (!v) { el.innerHTML = '<div class="card"><p style="color:var(--t3);font-size:14px;text-align:center;padding:.5rem">Nog geen testresultaten.</p></div>'; return; }
    el.innerHTML = `<div class="visit-card">
      <div class="visit-date">${v.visit_date}</div>
      <div class="visit-vals">${valChips(v)}</div>
      ${adviceHtml(v.advice_json)}
    </div>`;
  } catch (e) { el.innerHTML = ''; }
}

function applyUserToken() {
  let raw = document.getElementById('ut-in').value.trim();
  try { raw = new URL(raw).searchParams.get('m') || raw; } catch(e) {}
  if (!raw) return;
  saveParam('m', raw);
  location.href = '?m=' + encodeURIComponent(raw) + '&k=' + encodeURIComponent(getParam('k'));
}

// ── State 3: user bekend, geen zwembad ───────────────────────
async function renderChoose(app) {
  setHdr('Hallo, ' + USER.name, 'Kies een zwembad');
  app.innerHTML = '<div class="loading-block"><div class="sp"></div></div>';
  try {
    const d = await call('my_zwembaden&user_token=' + encodeURIComponent(getParam('m')));
    const zz = d.zwembaden || [];
    if (!zz.length) {
      app.innerHTML = `<div class="state"><div class="state-icon">🏊</div><div class="state-title">Geen zwembaden</div>
        <div class="state-sub">Je bent nog niet gekoppeld aan een zwembad. Vraag de beheerder.</div></div>`;
      return;
    }
    app.innerHTML = `
      <div class="card"><h2>Kies een zwembad</h2>${zz.map(z => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:.75rem 0;border-bottom:1px solid var(--bd)">
          <div><div style="font-weight:600">${esc(z.name)}</div>
          <div style="font-size:12px;color:var(--t3)">${esc(z.code)} · ${esc(z.address||'')}</div></div>
          <button class="btn btn-sm" onclick="pickZwembad('${esc(z.qr_token)}')">Kies</button>
        </div>`).join('')}
      </div>
      <div class="card"><h2>Of zoek op poolcode</h2>
        <div class="fg"><input class="code-input" id="ci2" maxlength="6" placeholder="PA0" oninput="this.value=this.value.toUpperCase()"></div>
        <button class="btn btn-out" onclick="lookupCode('ci2')">Zoeken</button>
      </div>`;
  } catch(e) { app.innerHTML = `<div class="state"><div class="state-sub">Fout: ${esc(e.message)}</div></div>`; }
}

function pickZwembad(token) {
  saveParam('k', token);
  location.href = '?m=' + encodeURIComponent(getParam('m')) + '&k=' + encodeURIComponent(token);
}

async function lookupCode(inputId) {
  const code = document.getElementById(inputId).value.trim();
  if (!code) return;
  try {
    const d = await call('zwembad&code=' + encodeURIComponent(code) + '&user_token=' + encodeURIComponent(getParam('m')));
    ZWEMBAD = d.zwembad;
    saveParam('k', ZWEMBAD.qr_token || '');
    render();
  } catch(e) { toast(e.message.includes('toegang') ? 'Niet publiek — log eerst in.' : 'Niet gevonden.', true); }
}

// ── State 4: volledige toegang ────────────────────────────────
function renderFull(app) {
  setHdr(ZWEMBAD.name, USER.name);
  app.innerHTML = `
    <div class="tabs">
      <button class="tab on" data-v="form"    onclick="switchTab(this)">Test invoeren</button>
      <button class="tab"    data-v="history" onclick="switchTab(this)">Geschiedenis</button>
    </div>
    <div id="v-form"></div>
    <div id="v-history" style="display:none"></div>`;
  buildForm();
  loadHistory();
}

function switchTab(btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('v-form').style.display    = btn.dataset.v === 'form'    ? '' : 'none';
  document.getElementById('v-history').style.display = btn.dataset.v === 'history' ? '' : 'none';
}

// ── Formulier ─────────────────────────────────────────────────
function buildForm() {
  const vol = (ZWEMBAD.volume_liters || 40000).toLocaleString('nl-NL');
  document.getElementById('v-form').innerHTML = `
    <div class="card">
      <h2>Teststrip analyseren</h2>
      <p style="font-size:13px;color:var(--t2);margin-bottom:12px">
        Maak één foto van de teststrip <strong>naast</strong> de kleurenkaart. Beide moeten goed zichtbaar zijn.
      </p>
      <div class="photo-zone" id="strip-zone">
        <input type="file" accept="image/*" capture="environment" onchange="onStripPhoto(this)">
        <div id="strip-inner">
          <div style="font-size:28px;margin-bottom:6px">📷</div>
          <div style="font-size:14px;font-weight:600;color:var(--t2)">Foto maken of uploaden</div>
          <div style="font-size:12px;color:var(--t3);margin-top:2px">Teststrip + kleurenkaart naast elkaar</div>
        </div>
      </div>
      <div id="roi-ui" style="display:none;margin-top:10px">
        <div style="position:relative;display:block;overflow:auto" id="roi-wrap">
          <canvas id="roi-canvas" style="display:block;border-radius:8px"></canvas>
          <canvas id="roi-overlay" style="position:absolute;top:0;left:0;border-radius:8px;cursor:crosshair"></canvas>
        </div>
        <div class="roi-btn-row">
          <button class="roi-btn strip" id="roi-btn-strip" onclick="startROI('strip')">📍 Strip</button>
          <button class="roi-btn chart" id="roi-btn-chart" onclick="startROI('chart')">🎨 Kleurenkaart</button>
          <button class="btn btn-sm" id="roi-analyse-btn" disabled onclick="runAnalysis()" style="flex:2">Analyseer</button>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:5px">
          <div id="roi-status" style="font-size:11px;color:var(--t3);flex:1">Selecteer de teststrip en de kleurenkaart</div>
          <label style="font-size:11px;color:var(--t3);cursor:pointer;display:flex;align-items:center;gap:3px;margin:0;white-space:nowrap">
            <input type="checkbox" id="roi-flip" onchange="renderROIOverlay()" style="width:auto;padding:0"> Strip omdraaien
          </label>
        </div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:6px;flex-wrap:wrap">
          <span style="font-size:10px;color:var(--t3)">pH-rij staat:</span>
          <button class="crot-btn on" id="crot0" onclick="setChartRot(0)">▲ Boven</button>
          <button class="crot-btn"    id="crot1" onclick="setChartRot(1)">▶ Rechts</button>
          <button class="crot-btn"    id="crot2" onclick="setChartRot(2)">▼ Onder</button>
          <button class="crot-btn"    id="crot3" onclick="setChartRot(3)">◀ Links</button>
        </div>
        <details id="debug-details" style="display:none;margin-top:8px">
          <summary>Debug info (crops + ΔE waarden)</summary>
          <div id="debug-panel" style="margin-top:6px"></div>
        </details>
      </div>
      <div id="ai-status" style="margin-top:.5rem"></div>
    </div>

    <div class="card">
      <h2>Metingen <span id="ai-badge" style="display:none;font-size:11px;font-weight:400;color:var(--g)">✓ Geanalyseerd — schuif om bij te stellen</span></h2>
      <div class="strip-grid">${PARAMS.map(p => paramCard(p)).join('')}</div>
      <input type="hidden" id="f-ph"   value="${PARAMS[0].def}">
      <input type="hidden" id="f-cl"   value="${PARAMS[1].def}">
      <input type="hidden" id="f-alk"  value="${PARAMS[2].def}">
      <input type="hidden" id="f-stab" value="${PARAMS[3].def}">
      <input type="hidden" id="f-vol"  value="${ZWEMBAD.volume_liters||40000}">
      <div class="fg" style="margin-top:.75rem">
        <label>Volume water</label>
        <div class="vol-display">${vol} liter</div>
      </div>
      <div class="fg"><label>Notities</label><textarea id="f-notes" placeholder="Bijzonderheden..."></textarea></div>
    </div>

    <div class="card" id="advice-section" style="display:none">
      <h2>Advies</h2>
      <div id="advice-content"></div>
    </div>

function paramCard(p) {

  const gradStops = p.cells.map(c =>
    `${c.c} ${((c.v - p.min) / (p.max - p.min) * 100).toFixed(1)}%`
  ).join(', ');
  const refCells = p.cells.map((c, i) =>
    `<div style="text-align:center;flex-shrink:0">
       <div id="crc-${p.key}-${i}"
         style="width:36px;height:28px;border-radius:4px;border:2px solid transparent;
                background:${c.c};flex-shrink:0"
         title="${c.v}"></div>
       <div style="font-size:9px;color:var(--t3);margin-top:1px">${c.v}</div>
     </div>`
  ).join('');
  return `<div class="strip-param">
    <div class="strip-param-label">${p.label}</div>

function applyAI(d) {
  AI_RESULT = d;
  document.getElementById('ai-badge').style.display = 'inline';

  PARAMS.forEach(p => {
    const raw = d[p.key];
    if (raw === null || raw === undefined) return;
    const value = parseFloat(raw);
    if (isNaN(value)) return;

    // Slider + verborgen veld + weergavewaarde
    const sl = document.getElementById('sl-' + p.key);
    if (sl) sl.value = value;
    const vd = document.getElementById('vv-' + p.key);
    if (vd) vd.textContent = value.toFixed(p.dec);
    setVal(p.fid, value.toFixed(p.dec));

    // Dichtstbijzijnde PARAMS-cel groene rand geven (visuele schaal)
    let bestIdx = 0, bestDist = Infinity;
    p.cells.forEach((c, i) => {
      const dist = Math.abs(c.v - value);
      if (dist < bestDist) { bestDist = dist; bestIdx = i; }
    });
    p.cells.forEach((_, i) => {
      const cv = document.getElementById('crc-' + p.key + '-' + i);
      if (cv) cv.style.border = i === bestIdx ? '2px solid var(--g)' : '2px solid transparent';
    });
    const rw = document.getElementById('rw-' + p.key);
    if (rw) rw.style.display = 'flex';
  });

  showAdvice();
}

// ── Strip foto laden (geen AI) ────────────────────────────────
async function onStripPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const inner = document.getElementById('strip-inner');
  inner.innerHTML = '<div class="sp"></div><div style="font-size:12px;color:var(--t2);margin-top:6px">Uploaden...</div>';
  try {
    // Upload voor opslag (url opslaan voor save_visit)
    const url = await uploadFile(file);
    extraPhotos.strip = url;

    // Laad volledige resolutie voor pixel-sampling
    const dataUrl = await new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload  = e => res(e.target.result);
      reader.onerror = rej;
      reader.readAsDataURL(file);
    });
    ANALYZE_IMG = new Image();
    ANALYZE_IMG.src = dataUrl;
    await new Promise(r => { ANALYZE_IMG.onload = r; ANALYZE_IMG.onerror = r; });

    // Initialiseer display canvas
    const zone    = document.getElementById('strip-zone');
    const roiUI   = document.getElementById('roi-ui');
    const canvas  = document.getElementById('roi-canvas');
    const overlay = document.getElementById('roi-overlay');
    const maxW    = Math.min(520, (document.getElementById('app').offsetWidth || 400) - 40);
    DISPLAY_SCALE  = Math.min(1, maxW / ANALYZE_IMG.naturalWidth);
    const dw = Math.round(ANALYZE_IMG.naturalWidth  * DISPLAY_SCALE);
    const dh = Math.round(ANALYZE_IMG.naturalHeight * DISPLAY_SCALE);
    // Stel ZOWEL canvas-pixels als CSS-grootte expliciet in (voorkomt mismatch overlay)
    canvas.width   = overlay.width  = dw;
    canvas.height  = overlay.height = dh;
    canvas.style.width  = overlay.style.width  = dw + 'px';
    canvas.style.height = overlay.style.height = dh + 'px';
    canvas.style.maxWidth = overlay.style.maxWidth = 'none';
    canvas.getContext('2d').drawImage(ANALYZE_IMG, 0, 0, dw, dh);
    DISPLAY_CANVAS = canvas;

    // Reset staat
    ROI = { strip: null, chart: null };
    SEL_MODE = null;
    _ANALYSIS_WC = null;
    zone.style.display  = 'none';
    roiUI.style.display = 'block';
    document.getElementById('debug-details').style.display = 'none';
    updateROIStatus();
    setupROIEvents();
  } catch(e) {
    inner.innerHTML = `<div style="color:var(--bad);font-size:13px">Upload mislukt: ${esc(e.message)}</div>`;
  }
}

function setVal(id, v) { const el = document.getElementById(id); if (el) el.value = v; }

function startROI(mode) {

function updateROIStatus() {
  const status     = document.getElementById('roi-status');
  const analyseBtn = document.getElementById('roi-analyse-btn');
  const stripBtn   = document.getElementById('roi-btn-strip');
  const chartBtn   = document.getElementById('roi-btn-chart');
  if (!status) return;

  stripBtn.textContent = ROI.strip ? '✓ Strip'        : '📍 Strip';
  chartBtn.textContent = ROI.chart ? '✓ Kleurenkaart' : '🎨 Kleurenkaart';
  stripBtn.classList.toggle('done',   !!ROI.strip);
  chartBtn.classList.toggle('done',   !!ROI.chart);
  stripBtn.classList.toggle('active', SEL_MODE === 'strip');
  chartBtn.classList.toggle('active', SEL_MODE === 'chart');

  if      (SEL_MODE === 'strip') status.textContent = 'Teken een rechthoek om de teststrip';
  else if (SEL_MODE === 'chart') status.textContent = 'Teken een rechthoek om de kleurenkaart op de fles';
  else if (!ROI.strip)           status.textContent = 'Klik "Strip" en teken een rechthoek om de teststrip';
  else if (!ROI.chart)           status.textContent = 'Klik "Kleurenkaart" en teken een rechthoek om de kleurenkaart';
  else                           status.textContent = 'Beide selecties klaar — klik Analyseer';

  const ready = !!(ROI.strip && ROI.chart);
  analyseBtn.disabled = !ready;
}

function setupROIEvents() {
  const overlay = document.getElementById('roi-overlay');
  if (!overlay || overlay._roiReady) return;
  overlay._roiReady = true;

  let dragging = false, dragStart = null;

  function getPos(e) {
    const rect  = overlay.getBoundingClientRect();
    const touch = e.touches?.[0] ?? e;
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  }
  function onDown(e) {
    if (!SEL_MODE) return;
    e.preventDefault(); dragging = true; dragStart = getPos(e);
  }
  function onMove(e) {
    if (!dragging) return;
    e.preventDefault(); renderROIOverlay(dragStart, getPos(e));
  }
  function onUp(e) {
    if (!dragging) return;
    e.preventDefault(); dragging = false;
    const pos = getPos(e.changedTouches?.[0] ?? e);
    const x1 = Math.min(dragStart.x, pos.x), y1 = Math.min(dragStart.y, pos.y);
    const x2 = Math.max(dragStart.x, pos.x), y2 = Math.max(dragStart.y, pos.y);
    if (x2 - x1 < 8 || y2 - y1 < 8) return;
    const s = 1 / DISPLAY_SCALE;
    ROI[SEL_MODE] = { x1: x1*s, y1: y1*s, x2: x2*s, y2: y2*s };
    SEL_MODE = null;
    renderROIOverlay();
    updateROIStatus();
  }
  overlay.addEventListener('mousedown',  onDown);
  overlay.addEventListener('mousemove',  onMove);
  overlay.addEventListener('mouseup',    onUp);
  overlay.addEventListener('touchstart', onDown, {passive:false});
  overlay.addEventListener('touchmove',  onMove, {passive:false});
  overlay.addEventListener('touchend',   onUp,   {passive:false});
}

function renderROIOverlay(dragFrom = null, dragTo = null) {
  const overlay = document.getElementById('roi-overlay');
  if (!overlay) return;
  const ctx = overlay.getContext('2d');
  const s   = DISPLAY_SCALE;
  ctx.clearRect(0, 0, overlay.width, overlay.height);

  function fillStroke(rect, stroke, fill) {
    ctx.strokeStyle = stroke; ctx.fillStyle = fill;
    ctx.lineWidth = 2; ctx.setLineDash([]);
    ctx.fillRect(rect.x*s, rect.y*s, rect.w*s, rect.h*s);
    ctx.strokeRect(rect.x*s, rect.y*s, rect.w*s, rect.h*s);
  }
  function toRect(roi) { return { x:roi.x1, y:roi.y1, w:roi.x2-roi.x1, h:roi.y2-roi.y1 }; }

  // Opgeslagen ROI's tekenen
  if (ROI.strip) fillStroke(toRect(ROI.strip), '#c89600', 'rgba(200,150,0,.08)');
  if (ROI.chart) fillStroke(toRect(ROI.chart), '#009eb0', 'rgba(0,158,176,.08)');

  // Grid-preview strip
  if (ROI.strip) {
    const r = ROI.strip;
    const vertical = (r.y2-r.y1) >= (r.x2-r.x1);
    ctx.strokeStyle = 'rgba(200,150,0,.5)'; ctx.lineWidth = 1; ctx.setLineDash([4,3]);
    for (let i = 1; i < 4; i++) {
      ctx.beginPath();
      if (vertical) { const y=(r.y1+(r.y2-r.y1)*i/4)*s; ctx.moveTo(r.x1*s,y); ctx.lineTo(r.x2*s,y); }
      else          { const x=(r.x1+(r.x2-r.x1)*i/4)*s; ctx.moveTo(x,r.y1*s); ctx.lineTo(x,r.y2*s); }
      ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  // Grid-preview referentiekaart (rotation-aware)
  if (ROI.chart) {
    const r   = ROI.chart;
    const cw  = (r.x2-r.x1)*s, ch = (r.y2-r.y1)*s;
    const nR  = CHART_LAYOUT.length;
    const nC  = Math.max(...CHART_LAYOUT.map(l=>l.cols));
    ctx.strokeStyle = 'rgba(0,158,176,.55)'; ctx.lineWidth = 1; ctx.setLineDash([4,3]);
    const rot = CHART_ROT % 4;
    const horiz = rot === 0 || rot === 2; // row direction = vertical (horizontal lines)
    if (horiz) {
      for (let i = 1; i < nR; i++) {
        const y = rot===0 ? (r.y1+(r.y2-r.y1)*i/nR)*s : (r.y2-(r.y2-r.y1)*i/nR)*s;
        ctx.beginPath(); ctx.moveTo(r.x1*s,y); ctx.lineTo(r.x2*s,y); ctx.stroke();
      }
      for (let i = 1; i < nC; i++) {
        const x = rot===0 ? (r.x1+(r.x2-r.x1)*i/nC)*s : (r.x2-(r.x2-r.x1)*i/nC)*s;
        ctx.beginPath(); ctx.moveTo(x,r.y1*s); ctx.lineTo(x,r.y2*s); ctx.stroke();
      }
    } else {
      for (let i = 1; i < nR; i++) {
        const x = rot===1 ? (r.x2-(r.x2-r.x1)*i/nR)*s : (r.x1+(r.x2-r.x1)*i/nR)*s;
        ctx.beginPath(); ctx.moveTo(x,r.y1*s); ctx.lineTo(x,r.y2*s); ctx.stroke();
      }
      for (let i = 1; i < nC; i++) {
        const y = rot===1 ? (r.y1+(r.y2-r.y1)*i/nC)*s : (r.y2-(r.y2-r.y1)*i/nC)*s;
        ctx.beginPath(); ctx.moveTo(r.x1*s,y); ctx.lineTo(r.x2*s,y); ctx.stroke();
      }
    }
    // pH label
    ctx.setLineDash([]); ctx.fillStyle='#009eb0'; ctx.font='bold 10px sans-serif';
    const lx = r.x1*s+3, ly = r.y1*s+11;
    const labels = ['pH▼','pH◀','pH▲','pH▶'];
    ctx.fillText(labels[rot], lx, ly);
  }

  // Lopende drag
  if (dragFrom && dragTo && SEL_MODE) {
    const color = SEL_MODE === 'strip' ? '#c89600' : '#009eb0';
    const fill  = SEL_MODE === 'strip' ? 'rgba(200,150,0,.1)' : 'rgba(0,158,176,.1)';
    ctx.strokeStyle = color; ctx.fillStyle = fill;
    ctx.lineWidth = 2; ctx.setLineDash([6,3]);
    ctx.fillRect(dragFrom.x, dragFrom.y, dragTo.x-dragFrom.x, dragTo.y-dragFrom.y);
    ctx.strokeRect(dragFrom.x, dragFrom.y, dragTo.x-dragFrom.x, dragTo.y-dragFrom.y);
    ctx.setLineDash([]);
  }
}

// ── Kleur wiskunde ────────────────────────────────────────────
function rgbToLab(r, g, b) {
  function linearize(v) {
    v /= 255;
    return v <= 0.04045 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  }
  const rl = linearize(r), gl = linearize(g), bl = linearize(b);
  // sRGB → XYZ (D65)
  const X = rl*0.4124564 + gl*0.3575761 + bl*0.1804375;
  const Y = rl*0.2126729 + gl*0.7151522 + bl*0.0721750;
  const Z = rl*0.0193339 + gl*0.1191920 + bl*0.9503041;
  // XYZ → LAB (D65 witpunt)
  function f(v) { return v > 0.008856 ? Math.cbrt(v) : 7.787*v + 16/116; }
  const fx = f(X/0.95047), fy = f(Y/1.00000), fz = f(Z/1.08883);
  return { L: 116*fy - 16, a: 500*(fx-fy), b: 200*(fy-fz) };
}

function deltaE(l1, l2) {
  return Math.sqrt((l1.L-l2.L)**2 + (l1.a-l2.a)**2 + (l1.b-l2.b)**2);
}

// Gemiddelde RGB+LAB van het MIDDENGEBIED van een cel
// Geeft ook het exacte sample-rectangle terug (zelfde pixels als berekening)
function sampleCell(ctx, x, y, w, h) {
  const m  = SAMPLE_MARGIN;
  const sx = Math.round(x + w*m),  sy = Math.round(y + h*m);
  const sw = Math.max(1, Math.round(w*(1-2*m))), sh = Math.max(1, Math.round(h*(1-2*m)));
  const data = ctx.getImageData(sx, sy, sw, sh).data;
  let rS=0, gS=0, bS=0, n=0;
  for (let i = 0; i < data.length; i += 4) {
    if (data[i+3] < 128) continue;
    rS += data[i]; gS += data[i+1]; bS += data[i+2]; n++;
  }
  if (!n) return { r:128, g:128, b:128, lab:{L:50,a:0,b:0}, sr:{x:sx,y:sy,w:sw,h:sh} };
  const r = Math.round(rS/n), g = Math.round(gS/n), b = Math.round(bS/n);
  return { r, g, b, lab: rgbToLab(r, g, b), sr:{x:sx,y:sy,w:sw,h:sh} };
}

// ── Strip pad-regio detecteren op basis van saturatie ─────────
// Geeft { startFrac, endFrac, autoFlip } terug in fraties van de ROI-lengte.
// autoFlip=true betekent dat de handgreep aan het BEGIN van de ROI zit.
function detectPadRegion(wCtx, roi) {
  const vert  = (roi.y2-roi.y1) >= (roi.x2-roi.x1);
  const len   = vert ? (roi.y2-roi.y1) : (roi.x2-roi.x1);
  const cross = vert ? (roi.x2-roi.x1) : (roi.y2-roi.y1);
  const N = 24, cm = 0.1;  // 24 slices, 10% cross-margin

  const sats = [];
  for (let i = 0; i < N; i++) {
    const off = len * i / N, sz = len / N;
    const [sx,sy,sw,sh] = vert
      ? [roi.x1+cross*cm, roi.y1+off, Math.max(1,cross*(1-2*cm)), Math.max(1,sz)]
      : [roi.x1+off, roi.y1+cross*cm, Math.max(1,sz), Math.max(1,cross*(1-2*cm))];
    const data = wCtx.getImageData(Math.round(sx),Math.round(sy),Math.round(sw),Math.round(sh)).data;
    let s=0, n=0;
    for (let j=0; j<data.length; j+=4) {
      const mx=Math.max(data[j],data[j+1],data[j+2]), mn=Math.min(data[j],data[j+1],data[j+2]);
      s += mx>0 ? (mx-mn)/mx : 0; n++;
    }
    sats.push(n>0 ? s/n : 0);
  }

  const maxSat = Math.max(...sats);
  if (maxSat < 0.04) return { startFrac:0, endFrac:1, autoFlip:false }; // geen contrast

  const thresh = maxSat * 0.28;
  let first=N, last=-1;
  for (let i=0; i<N; i++) if (sats[i]>=thresh) { if (i<first) first=i; last=i; }

  // Klein buffer erbij
  first = Math.max(0, first-1);
  last  = Math.min(N-1, last+1);
  const startFrac = first/N, endFrac = (last+1)/N;

  // Handgreep = eind met laagste saturatie
  // Als pads pas beginnen na >30% van strip → handgreep zit aan het begin → autoFlip
  return { startFrac, endFrac, autoFlip: startFrac > 0.3 };
}

// ── Cel-rechthoek in referentiekaart (rotation-aware) ─────────
function getChartCellRect(cr, rowIdx, numRows, colIdx, numCols) {
  const cw = cr.x2-cr.x1, ch = cr.y2-cr.y1;
  switch (CHART_ROT % 4) {
    case 0: // pH boven
      return { x:cr.x1+colIdx/numCols*cw, y:cr.y1+rowIdx/numRows*ch, w:cw/numCols, h:ch/numRows };
    case 1: // pH rechts
      return { x:cr.x2-(rowIdx+1)/numRows*cw, y:cr.y1+colIdx/numCols*ch, w:cw/numRows, h:ch/numCols };
    case 2: // pH onder
      return { x:cr.x2-(colIdx+1)/numCols*cw, y:cr.y2-(rowIdx+1)/numRows*ch, w:cw/numCols, h:ch/numRows };
    case 3: // pH links
      return { x:cr.x1+rowIdx/numRows*cw, y:cr.y2-(colIdx+1)/numCols*ch, w:cw/numRows, h:ch/numCols };
  }
}

// ── Hoofdanalyse ──────────────────────────────────────────────
async function runAnalysis() {
  if (!ANALYZE_IMG || !ROI.strip || !ROI.chart) return;
  const status = document.getElementById('ai-status');
  status.innerHTML = '<div class="loading-block"><div class="sp"></div><p style="margin-top:6px;font-size:13px">Analyseren...</p></div>';

  // Full-res canvas voor getImageData
  if (!_ANALYSIS_WC) {
    _ANALYSIS_WC = document.createElement('canvas');
    _ANALYSIS_WC.width  = ANALYZE_IMG.naturalWidth;
    _ANALYSIS_WC.height = ANALYZE_IMG.naturalHeight;
    _ANALYSIS_WC.getContext('2d').drawImage(ANALYZE_IMG, 0, 0);
  }
  const wCtx = _ANALYSIS_WC.getContext('2d');
  const sr   = ROI.strip;
  const cr   = ROI.chart;

  // ── Strip: detecteer pad-regio, sla handgreep over ──────────
  const padInfo    = detectPadRegion(wCtx, sr);
  const manualFlip = document.getElementById('roi-flip')?.checked ?? false;
  const flip       = padInfo.autoFlip !== manualFlip; // XOR: auto + handmatige override
  const stripVert  = (sr.y2-sr.y1) >= (sr.x2-sr.x1);
  const totalLen   = stripVert ? (sr.y2-sr.y1) : (sr.x2-sr.x1);
  const padOffset  = padInfo.startFrac * totalLen;
  const padRegLen  = (padInfo.endFrac - padInfo.startFrac) * totalLen;
  const padLen     = padRegLen / 4;

  const padSamples = {}, padRects = {};
  STRIP_PAD_ORDER.forEach((key, i) => {
    const idx = flip ? (3-i) : i;
    let px, py, pw, ph;
    if (stripVert) { px=sr.x1; py=sr.y1+padOffset+idx*padLen; pw=sr.x2-sr.x1; ph=padLen; }
    else           { px=sr.x1+padOffset+idx*padLen; py=sr.y1; pw=padLen; ph=sr.y2-sr.y1; }
    padSamples[key] = sampleCell(wCtx, px, py, pw, ph);
    padRects[key]   = { x:px, y:py, w:pw, h:ph };
  });

  // ── Referentiekaart: rotation-aware cellen samplen ───────────
  const chartSamples = {}, chartRects = {};
  const numRows = CHART_LAYOUT.length;
  CHART_LAYOUT.forEach((row, ri) => {
    chartSamples[row.key] = [];
    chartRects[row.key]   = [];
    for (let ci = 0; ci < row.cols; ci++) {
      const rect = getChartCellRect(cr, ri, numRows, ci, row.cols);
      chartSamples[row.key].push(sampleCell(wCtx, rect.x, rect.y, rect.w, rect.h));
      chartRects[row.key].push(rect);
    }
  });

  // Vergelijken: pad → referentierij, kleinste ΔE wint
  const results = {};
  PARAMS.forEach(p => {
    const padLab     = padSamples[p.key].lab;
    const refs       = chartSamples[p.key];
    let bestIdx = 0, bestDE = Infinity;
    const allDE = refs.map((ref, i) => {
      const d = deltaE(padLab, ref.lab);
      if (d < bestDE) { bestDE = d; bestIdx = i; }
      return d;
    });
    results[p.key] = {
      value:     p.cells[bestIdx]?.v ?? p.min,
      bestIdx,   bestDE,
      padSample: padSamples[p.key], padRect: padRects[p.key],
      refSamples: refs, chartRects: chartRects[p.key],
      allDE
    };
  });

  status.innerHTML = '';

  // Sliders + markeringen bijwerken (hergebruik applyAI)
  const vals = {};
  PARAMS.forEach(p => { vals[p.key] = results[p.key].value; });
  applyAI(vals);

  // Debug visualisaties
  renderDebugOverlay(results);
  renderDebugPanel(results);
  document.getElementById('debug-details').style.display = 'block';
}

// ── Debug: overlay op foto ─────────────────────────────────────
function renderDebugOverlay(results) {
  const overlay = document.getElementById('roi-overlay');
  if (!overlay) return;
  const ctx = overlay.getContext('2d');
  const s   = DISPLAY_SCALE;
  ctx.clearRect(0, 0, overlay.width, overlay.height);

  function sRect(sr, stroke, fill) {
    ctx.strokeStyle = stroke; ctx.fillStyle = fill;
    ctx.lineWidth = 1.5; ctx.setLineDash([]);
    ctx.fillRect(sr.x*s, sr.y*s, sr.w*s, sr.h*s);
    ctx.strokeRect(sr.x*s, sr.y*s, sr.w*s, sr.h*s);
  }

  PARAMS.forEach(p => {
    const r = results[p.key];
    if (!r) return;
    // Pad cel-kader (zichtbaar gebied)
    const pr = r.padRect;
    ctx.strokeStyle='rgba(200,150,0,.4)'; ctx.fillStyle='transparent'; ctx.lineWidth=1; ctx.setLineDash([]);
    ctx.strokeRect(pr.x*s, pr.y*s, pr.w*s, pr.h*s);
    // Pad sample-gebied (center crop — zelfde als berekening)
    sRect(r.padSample.sr, '#c89600', 'rgba(200,150,0,.15)');

    // Referentiecellen
    r.refSamples.forEach((ref, i) => {
      const cr  = r.chartRects[i];
      const best = i === r.bestIdx;
      ctx.strokeStyle='rgba(0,158,176,.35)'; ctx.fillStyle='transparent'; ctx.lineWidth=1; ctx.setLineDash([]);
      ctx.strokeRect(cr.x*s, cr.y*s, cr.w*s, cr.h*s);
      sRect(ref.sr, best ? '#1D9E75' : 'rgba(0,158,176,.7)', best ? 'rgba(29,158,117,.2)' : 'rgba(0,158,176,.06)');
    });
  });
}

// ── Debug: crop-panel ─────────────────────────────────────────
function renderDebugPanel(results) {
  const panel = document.getElementById('debug-panel');
  if (!panel) return;

  const lab2str = l => `L${l.L.toFixed(0)} a${l.a.toFixed(0)} b${l.b.toFixed(0)}`;

  panel.innerHTML = PARAMS.map(p => {
    const r = results[p.key];
    if (!r) return '';
    const val = typeof r.value === 'number' && p.dec === 1 ? r.value.toFixed(1) : r.value;
    return `<div class="dbg-row">
      <div class="dbg-row-title">${p.label}: <strong>${val}</strong> (ΔE ${r.bestDE.toFixed(1)})</div>
      <div class="dbg-cells">
        <div class="dbg-cell">
          <canvas id="dbg-pad-${p.key}" width="44" height="36" style="border:1.5px solid #c89600;border-radius:3px;display:block"></canvas>
          <div>strip pad</div>
          <div>${r.padSample.r},${r.padSample.g},${r.padSample.b}</div>
          <div>${lab2str(r.padSample.lab)}</div>
        </div>
        <div style="font-size:14px;color:var(--t3);padding-bottom:22px">→</div>
        ${r.refSamples.map((ref, i) => `
          <div class="dbg-cell">
            <canvas id="dbg-ref-${p.key}-${i}" width="36" height="28"
              style="border:1.5px solid ${i===r.bestIdx?'var(--g)':'transparent'};border-radius:3px;display:block"></canvas>
            <div>${p.cells[i]?.v ?? ''}</div>
            <div style="color:${i===r.bestIdx?'var(--g)':'var(--t3)'}">ΔE ${r.allDE[i].toFixed(1)}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  // Crops vullen vanuit de originele foto (zelfde pixels als gebruikt voor berekening)
  requestAnimationFrame(() => {
    function cropTo(id, sr) {
      const c = document.getElementById(id);
      if (!c) return;
      c.getContext('2d').drawImage(_ANALYSIS_WC,
        Math.round(sr.x), Math.round(sr.y),
        Math.max(1, Math.round(sr.w)), Math.max(1, Math.round(sr.h)),
        0, 0, c.width, c.height);
    }
    PARAMS.forEach(p => {
      const r = results[p.key];
      if (!r) return;
      cropTo('dbg-pad-' + p.key, r.padSample.sr);
      r.refSamples.forEach((ref, i) => cropTo('dbg-ref-' + p.key + '-' + i, ref.sr));
    });
  });
}

// ── Extra foto's ──────────────────────────────────────────────
async function uploadExtra(input, key) {
  const file = input.files[0];
  if (!file) return;
  const pr = document.getElementById('pr-' + key);
  pr.innerHTML = '<div class="sp"></div>';
  try {
    extraPhotos[key] = await uploadFile(file);
    pr.innerHTML = `<img src="${extraPhotos[key]}" class="photo-preview">`;
  } catch(e) { toast('Upload mislukt', true); pr.innerHTML = '<div style="color:var(--bad);font-size:12px">Mislukt</div>'; }
}

async function uploadFile(file) {
  const fd = new FormData();
  fd.append('photo', file);
  const r = await fetch(`${API}?action=upload_photo`, { method:'POST', body:fd });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error);
  return d.url;
}

function toB64(file) {
  return new Promise((res,rej) => {
    const reader = new FileReader();
    reader.onload  = e => res(e.target.result.split(',')[1]);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

// ── Advies ────────────────────────────────────────────────────
async function showAdvice() {
  const ph   = parseFloat(document.getElementById('f-ph')?.value);
  const cl   = parseFloat(document.getElementById('f-cl')?.value);
  const alk  = parseInt(document.getElementById('f-alk')?.value);
  const stab = document.getElementById('f-stab')?.value || null;
  const vol  = parseInt(document.getElementById('f-vol')?.value) || 40000;
  if (isNaN(ph) || isNaN(cl) || isNaN(alk)) return;
  try {
    const d = await call('get_advice', 'POST', {
      ph, chlorine: cl, alkalinity: alk,
      stabilizer: stab ? parseFloat(stab) : null,
      volume_liters: vol
    });
    const section = document.getElementById('advice-section');
    const content = document.getElementById('advice-content');
    if (!section || !content) return;
    const html = adviceHtml(d.advice);
    content.innerHTML = html || '<div class="advice ok"><div class="advice-title">Alles in orde</div><div class="advice-body">Waterwaarden zijn goed.</div></div>';
    section.style.display = '';
  } catch(e) { /* silently ignore */ }
}

// ── Bezoek opslaan ────────────────────────────────────────────
async function doSave() {
  const ph  = parseFloat(document.getElementById('f-ph').value);
  const cl  = parseFloat(document.getElementById('f-cl').value);
  const alk = parseInt(document.getElementById('f-alk').value);
  if (isNaN(ph)||isNaN(cl)||isNaN(alk)) return toast('Vul pH, chloor en alkaliniteit in.', true);

  const btn = document.getElementById('save-btn');
  btn.textContent = 'Opslaan...'; btn.disabled = true;
  try {
    const d = await call('save_visit', 'POST', {
      zwembad_id: ZWEMBAD.id, user_id: USER.id,
      ph, chlorine: cl, alkalinity: alk,
      stabilizer: document.getElementById('f-stab').value || null,
      volume_used: parseInt(document.getElementById('f-vol').value) || ZWEMBAD.volume_liters,
      notes: document.getElementById('f-notes').value,
      strip_photo: extraPhotos.strip,
      confirm_photo_chemicals: extraPhotos.chem,
      confirm_photo_pool: extraPhotos.pool,
    });
    document.getElementById('v-form').innerHTML = `
      <div class="card" style="text-align:center;padding:2rem">
        <div style="font-size:36px;margin-bottom:.5rem">✅</div>
        <div style="font-size:17px;font-weight:700;color:var(--gd);margin-bottom:.25rem">Bezoek opgeslagen!</div>
        <div style="font-size:13px;color:var(--t2);margin-bottom:1.25rem">E-mail ${d.mail_results?.any_sent?'verstuurd':'kon niet verstuurd worden'}.</div>
        <button class="btn" style="max-width:200px;margin:0 auto" onclick="location.reload()">Nieuw bezoek</button>
      </div>`;
    loadHistory();
  } catch(e) {
    toast('Opslaan mislukt: ' + e.message, true);
    btn.textContent = 'Bezoek opslaan'; btn.disabled = false;
  }
}

// ── Geschiedenis ──────────────────────────────────────────────
async function loadHistory() {
  const el = document.getElementById('v-history');
  if (!el) return;
  el.innerHTML = '<div class="loading-block"><div class="sp"></div></div>';
  try {
    const d = await call('zwembad_history&token=' + encodeURIComponent(getParam('k')) + '&user_token=' + encodeURIComponent(getParam('m')));
    const visits = d.visits || [];
    el.innerHTML = !visits.length
      ? '<div style="text-align:center;color:var(--t3);padding:2rem;font-size:14px">Nog geen bezoeken.</div>'
      : visits.map(v => `<div class="visit-card">
          <div class="visit-date">${v.visit_date} ${(v.visit_time||'').slice(0,5)} · ${esc(v.user_name||'')}</div>
          <div class="visit-vals">${valChips(v)}</div>
          ${adviceHtml(v.advice_json)}
          ${v.notes?`<div style="font-size:12px;color:var(--t2);margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--bd)">${esc(v.notes)}</div>`:''}
        </div>`).join('');
  } catch(e) { el.innerHTML = `<div style="color:var(--bad);font-size:13px;padding:1rem">${esc(e.message)}</div>`; }
}

// ── Helpers ───────────────────────────────────────────────────
function setHdr(title, sub) {
  document.getElementById('hdr-title').textContent = title;
  document.getElementById('hdr-sub').textContent   = sub;
}
function valChips(v) {
  const cc = [
    { l:`pH ${v.ph}`,         ok:v.ph>=7.2&&v.ph<=7.6,      w:v.ph>=6.8&&v.ph<=8.0 },
    { l:`Cl ${v.chlorine}`,   ok:v.chlorine>=1&&v.chlorine<=3, w:v.chlorine>=0.5 },
    { l:`Alk ${v.alkalinity}`,ok:v.alkalinity>=80&&v.alkalinity<=120, w:v.alkalinity>=60&&v.alkalinity<=150 },
  ];
  if (v.stabilizer!=null) cc.push({ l:`Stab ${v.stabilizer}`,ok:v.stabilizer>=30&&v.stabilizer<=80,w:v.stabilizer>=20&&v.stabilizer<=100 });
  return cc.map(c=>`<span class="val-chip ${c.ok?'val-ok':c.w?'val-warn':'val-bad'}">${esc(c.l)}</span>`).join('');
}
function adviceHtml(a) {
  if (!a?.items?.length) return '';
  return a.items.filter(i=>i.level!=='ok').map(i=>`
    <div class="advice ${i.level}">
      <div class="advice-title">${esc(i.title)}</div>
      <div class="advice-body">${esc(i.finding)}</div>
      ${i.dose_today?`<div class="advice-dose">Vandaag: ${esc(i.dose_today)}</div>`:''}
      ${i.dose_next ?`<div class="advice-body" style="margin-top:3px">Volgende week: ${esc(i.dose_next)}</div>`:''}
    </div>`).join('');
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
let toastTimer;
function toast(msg, err=false) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.background = err?'#c0392b':'#111';
  el.classList.add('on'); clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('on'), err?5000:3000);
}

boot();
</script>
