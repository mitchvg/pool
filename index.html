// ── Hoofdorchestrator auto-detectie (saturatie-blob) ─────────
async function autoDetect() {
  if (!ANALYZE_IMG) return;
  const spinner = document.getElementById('detect-spinner');
  if (spinner) spinner.style.display = 'flex';

  await new Promise(r => setTimeout(r, 20)); // laat UI updaten

  try {
    // Schaal naar 50% voor snellere detectie
    const scale = 0.5;
    const dw = Math.round(ANALYZE_IMG.naturalWidth  * scale);
    const dh = Math.round(ANALYZE_IMG.naturalHeight * scale);
    const tmp = document.createElement('canvas');
    tmp.width = dw; tmp.height = dh;
    tmp.getContext('2d').drawImage(ANALYZE_IMG, 0, 0, dw, dh);
    const imgData = tmp.getContext('2d').getImageData(0, 0, dw, dh);

    // Saturatiemask → label components → blobs
    const satMask = buildSatMask(imgData, dw, dh, 0.18);
    const { labels, count } = labelComponents(satMask, dw, dh);
    const blobs50 = buildBlobs(labels, imgData, dw, dh, count);

    // RANSAC: vind strip van 4 regelmatige pads
    const stripResult50 = ransacFindStrip(blobs50, dw, dh);
    const stripBlobLabels = new Set(stripResult50 ? stripResult50.padBlobs.map(b => b.label) : []);

    // Kaart-grid detectie (zonder strip-blobs)
    const chartResult50 = detectChartGrid(blobs50, stripBlobLabels, dw, dh);

    // Schaal terug naar full-res
    const sb = 1 / scale;

    let stripPadBlobs = null, stripCorners = null;
    if (stripResult50) {
      stripPadBlobs = stripResult50.padBlobs.map(b => ({
        label: b.label,
        cx: b.cx * sb, cy: b.cy * sb,
        area: b.area * sb * sb,
        bbox: { x1: b.bbox.x1*sb, y1: b.bbox.y1*sb, x2: b.bbox.x2*sb, y2: b.bbox.y2*sb }
      }));
      stripCorners = stripResult50.corners.map(p => ({ x: p.x*sb, y: p.y*sb }));
    }

    let chartRowBlobs = null, chartCorners = null;
    if (chartResult50) {
      chartRowBlobs = chartResult50.rowBlobs.map(row =>
        row.map(b => ({
          label: b.label,
          cx: b.cx * sb, cy: b.cy * sb,
          area: b.area * sb * sb,
          bbox: { x1: b.bbox.x1*sb, y1: b.bbox.y1*sb, x2: b.bbox.x2*sb, y2: b.bbox.y2*sb }
        }))
      );
      const cc = chartResult50.corners;
      chartCorners = { x0: cc.x0*sb, y0: cc.y0*sb, x1: cc.x1*sb, y1: cc.y1*sb };
    }

    // Sla full-res blobs op in globals
    STRIP_PAD_BLOBS  = stripPadBlobs;
    CHART_GRID_BLOBS = chartRowBlobs ? { rowBlobs: chartRowBlobs, corners: chartCorners } : null;

    // Toon overlay
    showDetectionOverlay(
      STRIP_PAD_BLOBS,
      CHART_GRID_BLOBS ? CHART_GRID_BLOBS.rowBlobs : null,
      stripCorners,
      chartCorners
    );

    // Full-res source canvas (hergebruik)
    if (!_ANALYSIS_WC) {
      _ANALYSIS_WC = document.createElement('canvas');
      _ANALYSIS_WC.width  = ANALYZE_IMG.naturalWidth;
      _ANALYSIS_WC.height = ANALYZE_IMG.naturalHeight;
      _ANALYSIS_WC.getContext('2d').drawImage(ANALYZE_IMG, 0, 0);
    }

    // Warp strip naar 100×400 (lange as altijd → Y)
    if (stripCorners) {
      const ord = orderCorners(stripCorners);
      const sw = Math.hypot(ord[1].x-ord[0].x, ord[1].y-ord[0].y);
      const sh = Math.hypot(ord[3].x-ord[0].x, ord[3].y-ord[0].y);
      const dst = sh >= sw
        ? [{x:0,y:0},{x:100,y:0},{x:100,y:400},{x:0,y:400}]   // portrait
        : [{x:0,y:400},{x:0,y:0},{x:100,y:0},{x:100,y:400}];   // landscape → roteer 90°
      const H = computeHomography(ord, dst);
      if (H) {
        const wc = document.createElement('canvas');
        wc.width = 100; wc.height = 400;
        STRIP_WARPED_CTX = wc.getContext('2d');
        applyHomography(_ANALYSIS_WC, STRIP_WARPED_CTX, 100, 400, H);
      }
    }

    // Warp kaart naar 360×240
    if (chartCorners) {
      const cc = chartCorners;
      const pts = [{x:cc.x0,y:cc.y0},{x:cc.x1,y:cc.y0},{x:cc.x1,y:cc.y1},{x:cc.x0,y:cc.y1}];
      const dst = [{x:0,y:0},{x:360,y:0},{x:360,y:240},{x:0,y:240}];
      const H = computeHomography(orderCorners(pts), dst);
      if (H) {
        const wc = document.createElement('canvas');
        wc.width = 360; wc.height = 240;
        CHART_WARPED_CTX = wc.getContext('2d');
        applyHomography(_ANALYSIS_WC, CHART_WARPED_CTX, 360, 240, H);
      }
    }

    AUTO_DETECT_DONE = !!(STRIP_PAD_BLOBS && CHART_GRID_BLOBS);

    if (AUTO_DETECT_DONE) {
      const analyseBtn = document.getElementById('roi-analyse-btn');
      if (analyseBtn) analyseBtn.disabled = false;
      const status = document.getElementById('roi-status');
      if (status) status.textContent = 'Strip en kaart gevonden — klik Analyseer';
      const adjCtrl = document.getElementById('adjust-controls');
      if (adjCtrl) adjCtrl.style.display = '';
      const fallback = document.getElementById('manual-fallback-btn');
      if (fallback) fallback.style.display = '';
    } else {
      showDetectionFailure(!STRIP_PAD_BLOBS, !CHART_GRID_BLOBS);
    }
  } catch(e) {
    console.error('autoDetect error:', e);
    showDetectionFailure(true, true);
  } finally {
    if (spinner) spinner.style.display = 'none';
  }
}

// ── Analyse op blob-gebaseerde detectie ──────────────────────
async function runAnalysisWarped() {
  const status = document.getElementById('ai-status');
  status.innerHTML = '<div class="loading-block"><div class="sp"></div><p style="margin-top:6px;font-size:13px">Analyseren...</p></div>';

  if (!STRIP_PAD_BLOBS || !CHART_GRID_BLOBS) {
    // Fallback: als STRIP_WARPED_CTX/CHART_WARPED_CTX beschikbaar zijn, gebruik die
    if (STRIP_WARPED_CTX && CHART_WARPED_CTX) {
      return runAnalysisWarpedFallback();
    }
    status.innerHTML = '<div style="color:var(--bad);font-size:13px;padding:8px;background:#fcebeb;border-radius:8px">⚠️ Geen detectiedata beschikbaar.</div>';
    return;
  }

  // Full-res imgData voor blobAvgLab
  if (!_ANALYSIS_WC) {
    _ANALYSIS_WC = document.createElement('canvas');
    _ANALYSIS_WC.width  = ANALYZE_IMG.naturalWidth;
    _ANALYSIS_WC.height = ANALYZE_IMG.naturalHeight;
    _ANALYSIS_WC.getContext('2d').drawImage(ANALYZE_IMG, 0, 0);
  }
  const fullImgData = _ANALYSIS_WC.getContext('2d').getImageData(0, 0, _ANALYSIS_WC.width, _ANALYSIS_WC.height);
  // Attach width/height for blobAvgLab
  fullImgData.width  = _ANALYSIS_WC.width;
  fullImgData.height = _ANALYSIS_WC.height;
  const fullW = _ANALYSIS_WC.width;

  // Voor elke pad blob: blobAvgLab → padLab
  const padLabs = {};
  STRIP_PAD_ORDER.forEach((key, i) => {
    const blob = STRIP_PAD_BLOBS[i];
    if (blob) padLabs[key] = blobAvgLab(blob, fullImgData, fullW);
  });

  // buildLiveChart → liveChart
  const liveChart = buildLiveChart(CHART_GRID_BLOBS.rowBlobs, CHART_ROT);

  // Voor elke parameter: beste ΔE match in liveChart rij i
  const results = {};
  PARAMS.forEach((p, pi) => {
    const padSample = padLabs[p.key];
    if (!padSample) return;
    const chartBlobs = liveChart[p.key] || [];
    const refSamples = chartBlobs.map(b => blobAvgLab(b, fullImgData, fullW));

    let bestIdx = 0, bestDE = Infinity;
    const allDE = refSamples.map((ref, i) => {
      const d = deltaE(padSample.lab, ref.lab);
      if (d < bestDE) { bestDE = d; bestIdx = i; }
      return d;
    });

    results[p.key] = {
      value: p.cells[bestIdx]?.v ?? p.min,
      bestIdx, bestDE,
      padSample,
      refSamples,
      chartBlobs,
      allDE
    };
  });

  status.innerHTML = '';
  const vals = {};
  PARAMS.forEach(p => { if (results[p.key]) vals[p.key] = results[p.key].value; });
  applyAI(vals);

  renderVerificationPanel(results);
  document.getElementById('debug-details').style.display = '';
}

// ── Fallback: analyse op warped canvassen (zonder blobs) ──────
async function runAnalysisWarpedFallback() {
  const status = document.getElementById('ai-status');
  const wCtx = STRIP_WARPED_CTX;
  const cCtx = CHART_WARPED_CTX;
  const sr   = WARPED_STRIP_ROI;
  const cr   = WARPED_CHART_ROI;

  const padInfo = detectPadRegion(wCtx, sr);
  if (padInfo.error) {
    status.innerHTML = `<div style="color:var(--bad);font-size:13px;padding:8px;background:#fcebeb;border-radius:8px">⚠️ ${padInfo.error}</div>`;
    return;
  }

  const manualFlip = document.getElementById('roi-flip')?.checked ?? false;
  const flip       = padInfo.autoFlip !== manualFlip;
  const stripVert  = (sr.y2-sr.y1) >= (sr.x2-sr.x1);
  const totalLen   = stripVert ? (sr.y2-sr.y1) : (sr.x2-sr.x1);
  const padOffset  = padInfo.startFrac * totalLen;
  const padRegLen  = (padInfo.endFrac - padInfo.startFrac) * totalLen;
  const padLen     = padRegLen / 4;

  const padSamples={}, padRects={};
  STRIP_PAD_ORDER.forEach((key, i) => {
    const idx = flip ? (3-i) : i;
    let px, py, pw, ph;
    if (stripVert) { px=sr.x1; py=sr.y1+padOffset+idx*padLen; pw=sr.x2-sr.x1; ph=padLen; }
    else           { px=sr.x1+padOffset+idx*padLen; py=sr.y1; pw=padLen; ph=sr.y2-sr.y1; }
    padSamples[key] = sampleCell(wCtx, px, py, pw, ph);
    padRects[key]   = {x:px, y:py, w:pw, h:ph};
  });

  const chartSamples={}, chartRects={};
  const numRows = CHART_LAYOUT.length;
  CHART_LAYOUT.forEach((row, ri) => {
    chartSamples[row.key]=[];
    chartRects[row.key]=[];
    for (let ci=0; ci<row.cols; ci++) {
      const rect = getChartCellRect(cr, ri, numRows, ci, row.cols);
      chartSamples[row.key].push(sampleCell(cCtx, rect.x, rect.y, rect.w, rect.h));
      chartRects[row.key].push(rect);
    }
  });

  const results={};
  PARAMS.forEach(p => {
    const padLab = padSamples[p.key].lab;
    const refs   = chartSamples[p.key];
    let bestIdx=0, bestDE=Infinity;
    const allDE = refs.map((ref,i) => {
      const d = deltaE(padLab, ref.lab);
      if (d < bestDE) { bestDE=d; bestIdx=i; }
      return d;
    });
    results[p.key] = {
      value: p.cells[bestIdx]?.v ?? p.min,
      bestIdx, bestDE,
      padSample:padSamples[p.key], padRect:padRects[p.key],
      refSamples:refs, chartRects:chartRects[p.key], allDE
    };
  });

  status.innerHTML = '';
  const vals={};
  PARAMS.forEach(p => { vals[p.key] = results[p.key].value; });
  applyAI(vals);

  renderVerificationPanel(results);
  document.getElementById('debug-details').style.display = '';
}

// ── Verificatie-panel (vervangt renderDebugPanel/Warped) ───────
function renderVerificationPanel(results) {
  const panel = document.getElementById('debug-panel');
  if (!panel) return;

  panel.innerHTML = PARAMS.map(p => {
    const r = results[p.key]; if (!r) return '';
    const val = typeof r.value === 'number' && p.dec === 1 ? r.value.toFixed(1) : r.value;
    const de  = typeof r.bestDE === 'number' ? r.bestDE.toFixed(1) : '?';

    // Pad crop: use padSample.sr if available (bbox rect in source canvas)
    const padSr = r.padSample?.sr;

    // Reference cells: either chartBlobs (blob mode) or chartRects (warped mode)
    const nRefs = r.refSamples ? r.refSamples.length : 0;
    const refCells = r.refSamples ? r.refSamples.map((ref, i) => {
      const isBest = i === r.bestIdx;
      return `<div class="dbg-cell">
        <canvas id="vrif-ref-${p.key}-${i}" width="48" height="40"
          style="border:2px solid ${isBest ? '#1D9E75' : 'transparent'};border-radius:3px;display:block"></canvas>
        <div style="font-size:8px;color:${isBest ? '#1D9E75' : 'var(--t3)'}">ΔE ${r.allDE[i]?.toFixed(1) ?? ''}</div>
      </div>`;
    }).join('') : '';

    return `<div class="verif-section">
      <div class="verif-title">${p.label}: ${val} (ΔE ${de})</div>
      <div class="verif-cells">
        <div class="dbg-cell">
          <canvas id="vrif-pad-${p.key}" width="72" height="56"
            style="border:1.5px solid #c89600;border-radius:3px;display:block"></canvas>
          <div style="font-size:8px;color:var(--t3)">strip pad</div>
        </div>
        <div style="font-size:14px;color:var(--t3);padding-bottom:20px">→</div>
        ${refCells}
      </div>
    </div>`;
  }).join('');

  requestAnimationFrame(() => {
    function cropToCanvas(id, srcCanvas, sr) {
      const c = document.getElementById(id); if (!c || !srcCanvas) return;
      c.getContext('2d').drawImage(srcCanvas,
        Math.round(sr.x ?? sr.x1 ?? 0), Math.round(sr.y ?? sr.y1 ?? 0),
        Math.max(1, Math.round(sr.w ?? (sr.x2 - sr.x1) ?? 1)),
        Math.max(1, Math.round(sr.h ?? (sr.y2 - sr.y1) ?? 1)),
        0, 0, c.width, c.height);
    }
    function cropToBlobCanvas(id, blob) {
      if (!blob || !_ANALYSIS_WC) return;
      const bb = blob.bbox;
      cropToCanvas(id, _ANALYSIS_WC, {
        x: bb.x1, y: bb.y1, w: bb.x2 - bb.x1, h: bb.y2 - bb.y1
      });
    }

    PARAMS.forEach(p => {
      const r = results[p.key]; if (!r) return;

      // Pad crop
      if (r.padSample?.sr) {
        // Warped mode: sr references strip warped canvas
        const srcCanvas = STRIP_WARPED_CTX ? STRIP_WARPED_CTX.canvas : _ANALYSIS_WC;
        cropToCanvas('vrif-pad-' + p.key, srcCanvas, r.padSample.sr);
      } else if (STRIP_PAD_BLOBS) {
        const pi = STRIP_PAD_ORDER.indexOf(p.key);
        if (pi >= 0) cropToBlobCanvas('vrif-pad-' + p.key, STRIP_PAD_BLOBS[pi]);
      }

      // Ref cells
      if (r.refSamples) {
        r.refSamples.forEach((ref, i) => {
          if (r.chartBlobs && r.chartBlobs[i]) {
            // Blob mode: draw from full-res canvas
            cropToBlobCanvas('vrif-ref-' + p.key + '-' + i, r.chartBlobs[i]);
          } else if (ref.sr) {
            // Warped mode: draw from chart warped canvas
            const srcCanvas = CHART_WARPED_CTX ? CHART_WARPED_CTX.canvas : _ANALYSIS_WC;
            cropToCanvas('vrif-ref-' + p.key + '-' + i, srcCanvas, ref.sr);
          }
        });
      }
    });
  });
}

boot();
</script>
</body>
</html>
